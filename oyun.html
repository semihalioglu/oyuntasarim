const BUILDING_NAMES={ahır:'AHİR',kümes:'KÜMES',degirmen:'DEĞİRMEN',kuyu:'KUYU',grid:'TARLA',fırın:'FIRIN'};
const BUILDING_PRICES={ahır:2500,kümes:1500,degirmen:3000,kuyu:2000,grid:100,fırın:2500};

function getBuildingAt(mx,my){
  let keys=Object.keys(BUILDING_NAMES);
  for(let i=keys.length-1;i>=0;i--){
    let k=keys[i];
    if(k==='grid'){
      if(!S.built.grid)continue;
      if(mx>=GX&&mx<=GX+COLS*CL&&my>=GY&&my<=GY+ROWS*CL)return k;
    }else if(k==='kuyu'){
      if(!S.built.kuyu)continue;
      if(typeof wellS==='undefined')continue;
      if(Math.abs(mx-wellX)<wellS*0.7&&Math.abs(my-wellY)<wellS*0.7)return k;
    }else if(k==='ahır'){
      if(!S.built.ahır)continue;
      if(typeof barnS==='undefined')continue;
      if(Math.abs(mx-barnX)<barnS*0.7&&Math.abs(my-barnY)<barnS*0.7)return k;
    }else if(k==='kümes'){
      if(!S.built.kümes)continue;
      if(typeof kümesS==='undefined')continue;
      if(Math.abs(mx-kümesX)<kümesS*0.7&&Math.abs(my-kümesY)<kümesS*0.7)return k;
    }else if(k==='degirmen'){
      if(!S.built.degirmen)continue;
      if(typeof wmS==='undefined')continue;
      if(Math.abs(mx-wmX)<wmS*0.7&&Math.abs(my-wmY)<wmS*0.7)return k;
    }else if(k==='fırın'){
      if(!S.built.fırın)continue;
      if(typeof firinS==='undefined')continue;
      if(Math.abs(mx-firinX)<firinS*0.7&&Math.abs(my-firinY)<firinS*0.7)return k;
    }
  }
  return null;
}

function startDrag(key){
  S.dragging=key;
  toast('Binayı sürükle bırakın. ESC ile iptal.');
}

function cancelDrag(){
  if(!S.dragging)return;
  S.dragging=null;
  S.buildingMenu=null;
  toast('Taşıma iptal edildi.');
  draw();
}

function finishDrag(){
  if(!S.dragging)return;
  let key=S.dragging;
  let pos=getBuildingCenter(key);
  if(!pos){cancelDrag();return}
  if(!isValidPlacement(key,pos.x,pos.y)){
    toast('Geçersiz konum! Başka bir yere bırakın.');
    return;
  }
  S.buildingPos[key]={x:pos.x,y:pos.y};
  if(key==='grid'&&GRID_LINKED_KUYU&&S.built.kuyu){
    let defKuyu=getDefaultKuyuPos();
    if(!S.buildingPos.kuyu){
      S.buildingPos.kuyu={x:defKuyu.x,y:defKuyu.y};
    }
    S.buildingPos.kuyu.x=pos.x+defKuyu.dx;
    S.buildingPos.kuyu.y=pos.y+defKuyu.dy;
  }
  S.dragging=null;
  toast(BUILDING_NAMES[key]+' yerleştirildi!');
  draw();
}

function getBuildingCenter(key){
  if(!S.dragging)return null;
  return{x:S.dragX,y:S.dragY};
}

function getDefaultKuyuPos(){
  let gcx=GX+COLS*CL/2;
  let gbottom=GY+ROWS*CL;
  let mwy=H-48-CL*1.2;
  let ky=Math.min(gbottom+CL*1.5,mwy);
  return{x:gcx,y:ky,dx:0,dy:Math.min(gbottom+CL*1.5,mwy)-GY};
}

function isValidPlacement(key,x,y){
  let pad=CL*0.5;
  if(x<pad||x>W-pad||y<pad||y>H-48-pad)return false;
  let hx=(function(){
    let hs=CL*(ISLANDSCAPE?2.8:2.0);
    let hg=CL*1.2;
    let hvx=Math.min(GX-hg,W*0.16+hs);
    hvx=Math.max(hs+CL*0.3,hvx);
    return hvx;
  })();
  let hy=sceneTop;
  if(key!=='grid'&&Math.abs(x-hx)<CL*3&&Math.abs(y-hy)<CL*3)return false;
  if(key!=='grid'){
    if(S.built.grid&&x>GX-CL*2&&x<GX+COLS*CL+CL*2&&y>GY-CL*2&&y<GY+ROWS*CL+CL*2)return false;
  }
  if(key==='grid'){
    if(x<CL*2||x+COLS*CL>W-CL*2)return false;
    if(y<sceneTop+CL||y+ROWS*CL>H-48-CL*2)return false;
  }
  return true;
}

function sellBuilding(key){
  let price=BUILDING_PRICES[key]||0;
  let refund=Math.floor(price*SELL_RATIO);
  if(!S.built[key]){toast('Bu bina inşa edilmemiş!');return}
  S.built[key]=false;
  S.money+=refund;
  S.buildingPos[key]=null;
  if(key==='grid'){
    S.plots=[];S.plowed=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)S.plots.push({r,c,crop:null,age:0,w:false,p:false,nextHarvest:0,harvestCount:0});
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)S.plowed.push(r*COLS+c);
    S.irrigating=false;S.sel=-1;
  }
  S.buildingMenu=null;S.dragging=null;
  toast(BUILDING_NAMES[key]+' satıldı! +'+refund+' TL');
  updateHUD();
}

function showBuildingMenu(key,mx,my){
  S.buildingMenu={key:key,x:mx,y:my};
  draw();
}

function drawBuildingMenu(){
  if(!S.buildingMenu)return;
  let m=S.buildingMenu;
  let bx=m.x-60,by=m.y-90;
  if(bx<10)bx=10;if(bx+120>W-10)bx=W-130;
  if(by<10)by=m.y+10;
  X.fillStyle='rgba(40,25,10,0.95)';
  X.strokeStyle='#c8956c';X.lineWidth=2;
  X.beginPath();X.roundRect(bx,by,120,80,8);X.fill();X.stroke();
  X.fillStyle='#ffe082';X.font='bold 11px "Nunito",Arial,sans-serif';X.textAlign='center';
  X.fillText(BUILDING_NAMES[m.key],bx+60,by+16);
  let items=[
    {text:'📍 Kaydır',y:by+30,action:'drag'},
    {text:'🗑 Kaldır ('+Math.floor((BUILDING_PRICES[m.key]||0)*SELL_RATIO)+' TL)',y:by+50,action:'sell'},
    {text:'✖ İptal',y:by+70,action:'cancel'}
  ];
  items.forEach(it=>{
    X.fillStyle='#d7ccc8';X.font='11px "Nunito",Arial,sans-serif';X.textAlign='center';
    if(mx>bx&&mx<bx+120&&my>it.y-8&&my<it.y+10){
      X.fillStyle='#ffe082';X.fillRect(bx+2,it.y-10,116,18);
      X.fillStyle='#3e2723';
    }
    X.fillText(it.text,bx+60,it.y+3);
  });
  S.buildingMenu.items=items;
}

let longPressTimer=null;
let longPressPos={x:0,y:0};
let mouseDownTime=0;
let mouseDownPos={x:0,y:0};

CV.addEventListener('mousedown',e=>{
  let mx=e.clientX,my=e.clientY;
  mouseDownTime=Date.now();
  mouseDownPos={x:mx,y:my};
  if(S.dragging){
    S.dragX=mx;S.dragY=my;
    finishDrag();
    return;
  }
  if(S.buildingMenu){
    let m=S.buildingMenu;
    let bx=m.x-60,by=m.y-90;
    if(by<10)by=m.y+10;
    if(mx>bx&&mx<bx+120&&m.items){
      for(let it of m.items){
        if(my>it.y-8&&my<it.y+10){
          if(it.action==='drag'){S.buildingMenu=null;startDrag(m.key)}
          else if(it.action==='sell')sellBuilding(m.key);
          else{S.buildingMenu=null;draw()}
          return;
        }
      }
    }
    S.buildingMenu=null;draw();return;
  }
  longPressTimer=setTimeout(()=>{
    let b=getBuildingAt(mx,my);
    if(b){showBuildingMenu(b,mx,my)}
  },500);
});

CV.addEventListener('mousemove',e=>{
  let mx=e.clientX,my=e.clientY;
  if(S.dragging){
    e.preventDefault();
    S.dragX=mx;S.dragY=my;
    draw();
    return;
  }
  if(mouseDownTime>0&&Date.now()-mouseDownTime>300){
    let dx=mx-mouseDownPos.x,dy=my-mouseDownPos.y;
    if(Math.sqrt(dx*dx+dy*dy)>10){
      clearTimeout(longPressTimer);longPressTimer=null;
      let b=getBuildingAt(mouseDownPos.x,mouseDownPos.y);
      if(b){mouseDownTime=0;startDrag(b);S.dragX=mx;S.dragY=my;draw()}
    }
  }
});

CV.addEventListener('mouseup',e=>{
  mouseDownTime=0;
  clearTimeout(longPressTimer);longPressTimer=null;
});

CV.addEventListener('touchstart',e=>{
  let t=e.touches[0];let mx=t.clientX,my=t.clientY;
  mouseDownTime=Date.now();mouseDownPos={x:mx,y:my};
  longPressTimer=setTimeout(()=>{
    let b=getBuildingAt(mx,my);
    if(b){showBuildingMenu(b,mx,my)}
  },500);
},{passive:true});

    if(Math.sqrt(dx*dx+dy*dy)>10){
      clearTimeout(longPressTimer);longPressTimer=null;
      let b=getBuildingAt(mouseDownPos.x,mouseDownPos.y);
      if(b){mouseDownTime=0;startDrag(b);S.dragX=mx;S.dragY=my;draw()}
    }
  }
},{passive:false});

CV.addEventListener('touchend',e=>{
  mouseDownTime=0;
  clearTimeout(longPressTimer);longPressTimer=null;
  if(S.dragging){finishDrag()}
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&S.dragging){cancelDrag()}
  if(e.key==='Escape'&&S.buildingMenu){S.buildingMenu=null;draw()}
});

const SAVE_VERSION=11;
function save(){S._v=SAVE_VERSION;localStorage.setItem('farm5',JSON.stringify(S))}
function load(){let d=localStorage.getItem('farm5');
  if(d){let l=JSON.parse(d);if(l._v!==SAVE_VERSION){localStorage.removeItem('farm5');return}
    Object.assign(S,l);if(!S.dailyHarvest)S.dailyHarvest={};if(!S.dailyAnimal)S.dailyAnimal={};
    if(S.dailySold===undefined)S.dailySold=0;
    if(!S.built)S.built={degirmen:false,kuyu:false,ahır:false,kümes:false,grid:false,fırın:false};
    if(S.built.grid===undefined)S.built.grid=false;
    if(S.built.fırın===undefined)S.built.fırın=false;
    if(!S.buildingPos)S.buildingPos={grid:null,kuyu:null,ahır:null,kümes:null,degirmen:null,fırın:null};
    if(!S.tutorial)S.tutorial={active:false,step:0,type:'bread',completed:false};
    if(S.invUN===undefined)S.invUN=0;
    if(S.invEKMEK===undefined)S.invEKMEK=0;
    S.dragging=null;S.buildingMenu=null;
    Object.keys(CROPS).forEach(k=>{if(S.dailyHarvest[k]===undefined)S.dailyHarvest[k]=0});
    if(S.dailyAnimal.YUMURTA===undefined)S.dailyAnimal.YUMURTA=0;
    if(S.dailyAnimal.SUT===undefined)S.dailyAnimal.SUT=0;
    if(S.dailyAnimal.YUN===undefined)S.dailyAnimal.YUN=0;
  }
}
function loop(){
  let now=Date.now();
  let dt=(now-lastFrameTime)/1000;
  lastFrameTime=now;
  if(S.built.degirmen){
    let windSpeed=S.windSpeed||5;
    let rotSpeed=windSpeed*0.0015;
    windmillAngle+=rotSpeed*dt*60;
    if(windmillAngle>Math.PI*2)windmillAngle-=Math.PI*2;
  }
  draw();save();requestAnimationFrame(loop)}
load();updateHUD();generateMissions();renderMissions();
setTimeout(()=>{document.getElementById('infoPanel').style.opacity='0'},20000);
loop();
</script>
