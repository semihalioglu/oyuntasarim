function sellW(){let w=S.curW;if(!w)return;let av=S.inv[w.crop]||0;if(av<w.kg)return;
  let unit=w.crop==='YUMURTA'?'adet':w.crop==='SUT'?'litre':w.crop==='YUN'?'adet':'kg';
  S.inv[w.crop]-=w.kg;S.money+=Math.round(w.kg*w.price);S.totalSold+=Math.round(w.kg*w.price);S.dailySold+=Math.round(w.kg*w.price);
  toast(`${w.kg} ${unit} ${w.name} satildi! +${Math.round(w.kg*w.price).toLocaleString()} TL`);dismissW();checkMissions()}
function dismissW(){S.whDis=true;S.curW=null;closeM('whole');updateHUD()}

let lastPlantClick=-1;
CV.addEventListener('click',e=>{
  let mx=e.clientX,my=e.clientY;
  let gx=mx-GX,gy=my-GY;
  let c=Math.floor(gx/CL),r=Math.floor(gy/CL);

  // Ahıra tıklama - süt sağma (gunluk 2 kez)
  if(typeof barnX!=='undefined'){
    let bDx=mx-barnX,bDy=my-barnY;
    if(Math.abs(bDx)<barnS*0.6&&Math.abs(bDy)<barnS*0.6){
      if(!S.built.ahir){toast('Once ahir insa et!');return}
      if(S.co>0){
        if(sutCount>=2){toast('Bugun zaten 2 kez sut sagildi! Yarin tekrar dene.');return}
        let sut=Math.min(S.co,3)*2;
        S.inv.SUT=(S.inv.SUT||0)+sut;
        sutCount++;
        toast(`${sut} lt Sut sagildi! (${sutCount}/2) Toplam: ${(S.inv.SUT||0)} lt`);
        advanceTime();draw();return
      }else{toast('Ahirda inek yok!');return}
    }
  }
  // Kümüse tıklama - yumurta toplama (gunluk 1 kez)
  if(typeof kumesX!=='undefined'){
    let kDx=mx-kumesX,kDy=my-kumesY;
    if(Math.abs(kDx)<kumesS*0.6&&Math.abs(kDy)<kumesS*0.6){
      if(!S.built.kumes){toast('Once kumes insa et!');return}
      if(S.ch>0){
        if(yumurtaCount>=1){toast('Bugun zaten yumurta toplandı! Yarin tekrar dene.');return}
        let yumurta=Math.min(S.ch,6);
        S.inv.YUMURTA=(S.inv.YUMURTA||0)+yumurta;
        yumurtaCount++;
        toast(`${yumurta} Yumurta toplandi! (${yumurtaCount}/1) Toplam: ${(S.inv.YUMURTA||0)} adet`);
        advanceTime();draw();return
      }else{toast('Kumeste tavuk yok!');return}
    }
  }
  // Kuyuya tıklama - sulama baslat/durdur
  if(typeof wellX!=='undefined'){
    let wDx=mx-wellX,wDy=my-wellY;
    if(Math.abs(wDx)<wellS*0.6&&Math.abs(wDy)<wellS*0.6){
      if(!S.built.kuyu){toast('Once kuyu insa et!');return}
      if(S.irrigating){
        // Sulamayi durdur
        let elapsedMin=(S.h-S.irrigStartH)*60+(S.m-S.irrigStartM);
        if(elapsedMin<40){
          S.irrigating=false;
          S.plots.forEach(p=>{p.w=false});
          toast('Sulama iptal edildi! 40 dk altinda kaldigi icin sulanmadi.');
        }else{
          S.irrigating=false;
          S.plots.forEach(p=>{p.w=true});
          toast('Sulama durduruldu! Tarla sulandi. ('+elapsedMin+' dk)');
        }
        advanceTime();draw();return
      }else{
        // Sulamayi baslat
        S.irrigating=true;
        S.irrigStartH=S.h;S.irrigStartM=S.m;
        S.irrigEndH=S.h+1;S.irrigEndM=S.m;
        if(S.irrigEndH>=22){S.irrigEndH=21;S.irrigEndM=50}
        toast('Sulama baslatildi! Tekrar tiklayarak durdurabilirsin.');
        advanceTime();draw();return
      }
    }
  }

  if(S.tractorActive&&r>=0&&r<ROWS&&c>=0&&c<COLS){plowArea(r,c);S.tractorActive=false;draw();return}
  if(r<0||r>=ROWS||c<0||c>=COLS){closeAllModals();lastPlantClick=-1;S.sel=-1;draw();return}
  S.sel=r*COLS+c;let p=getP(r,c);
  if(!p.crop){
    if(!S.plowed.includes(r*COLS+c)){toast('Once traktorle sur!');return}
    let idx=r*COLS+c;
    if(lastPlantClick===idx&&document.getElementById('mPlant').classList.contains('active')){closeM('plant');lastPlantClick=-1;draw();return}
    lastPlantClick=idx;openPlantM(r,c);
  }else{lastPlantClick=-1;openPlotM(r,c)}draw();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAllModals();S.tractorActive=false;lastPlantClick=-1;S.sel=-1;draw()}});
function closeAllModals(){['plant','plot','shop','animal','storage','whole','tesisler'].forEach(m=>closeM(m))}
function getP(r,c){return S.plots.find(p=>p.r===r&&p.c===c)}

function openPlantM(r,c){let l=document.getElementById('plantList');l.innerHTML='';let isWinter=S.sea===3;
  Object.entries(CROPS).forEach(([k,cr])=>{let ok=!isWinter;
    let d=document.createElement('div');d.className='item';
    let harvestInfo='3te 1 gun';let winterNote=isWinter?' (Kisin ekilmez)':'';
    d.innerHTML=`<div class="inf"><div class="nm">${cr.name}${winterNote}</div><div class="dt">Sebze | Max:${cr.mk}kg | Hasat: ${harvestInfo}</div></div><div class="pr">${cr.buy} TL</div>`;
    if(!ok){d.style.opacity='.3';d.style.cursor='not-allowed'}
    else d.onclick=()=>{if(S.money<cr.buy){toast('Yeterli paran yok!');return}S.money-=cr.buy;let p=getP(r,c);p.crop=k;p.age=0;p.w=false;p.p=false;p.nextHarvest=480;S.plantCount++;advanceTime();closeM('plant');toast(`${cr.name} ekildi!`);draw()};
    l.appendChild(d)});openM('plant')}

function openPlotM(r,c){let p=getP(r,c),cr=CROPS[p.crop];if(!cr)return;
  let age=(p.age/365).toFixed(1),ib=p.w?Math.min(.2,S.st.SULAMA*.04):0,pb=p.p?Math.min(.2,S.st.ICLAMA*.04):0;
  let g=Math.min(1,(p.age/365)/cr.my),y=(cr.mk*g*cr.sea[S.sea]*(1+ib)*(1+pb)).toFixed(2);
  let harvestText='';let canHarvest=p.nextHarvest<=0;
  if(!canHarvest){let hrs=Math.floor(p.nextHarvest/60);let mins=p.nextHarvest%60;harvestText=`<div>Siradaki hasat: <b>${hrs}sa ${mins}dk</b></div>`}
  else{harvestText=`<div style="color:#8bc34a;font-weight:bold">Hasat hazir!</div>`}
  document.getElementById('plotT').textContent=cr.name;
  document.getElementById('plotI').innerHTML=`<div>Yas: <b>${age} yil</b></div><div>Tahmini: <b>${y} kg</b></div>${harvestText}<div>Sulama: <b>${p.w?'Evet':'Yok'}</b></div><div>Ilaclama: <b>${p.p?'Evet':'Yok'}</b></div>`;
  let bH=document.getElementById('bH');bH.disabled=!canHarvest;bH.style.opacity=canHarvest?1:.4;
  document.getElementById('bW').disabled=p.w;document.getElementById('bW').style.opacity=p.w?.4:1;
  document.getElementById('bP').disabled=p.p;document.getElementById('bP').style.opacity=p.p?.4:1;openM('plot')}

function harvestP(){let p=S.plots[S.sel];if(!p||!p.crop)return;
  if(p.nextHarvest>0){toast('Hasat icin bekleyin!');return}let cr=CROPS[p.crop];if(!cr)return;
  let ib=p.w?Math.min(.2,S.st.SULAMA*.04):0,pb=p.p?Math.min(.2,S.st.ICLAMA*.04):0;
  let g=Math.min(1,(p.age/365)/cr.my);let y=cr.mk*g*cr.sea[S.sea];
  y/=3;if(p.w)y*=(1+ib);if(p.p)y*=(1+pb);
  let cap=500+S.st.DEPO*200,used=Object.values(S.inv).reduce((a,b)=>a+b,0);
  if(y>0&&(used+y)<=cap){S.inv[p.crop]=(S.inv[p.crop]||0)+y;S.dailyHarvest[p.crop]=(S.dailyHarvest[p.crop]||0)+y;
    p.age++;p.w=false;p.p=false;p.nextHarvest=480;advanceTime();
    toast(`${cr.name} hasat edildi! +${y.toFixed(1)} kg`);closeM('plot');draw();checkMissions()}
  else if(y>0){toast('Depo dolu!')}}
function waterP(){let p=S.plots[S.sel];if(p&&!p.w){p.w=true;S.waterCount++;advanceTime();closeM('plot');toast('Sulama yapildi!');draw();checkMissions()}}
function pestP(){let p=S.plots[S.sel];if(p&&!p.p){p.p=true;advanceTime();closeM('plot');toast('Ilaclama yapildi!');draw()}}
function removeC(){let p=S.plots[S.sel];if(p){if(S.money<50){toast('50 TL gerekli!');return}S.money-=50;p.crop=null;p.age=0;p.w=false;p.p=false;p.nextHarvest=0;closeM('plot');toast('Sokuldu! -50 TL');draw()}}

function openM(id){document.getElementById('m'+id.charAt(0).toUpperCase()+id.slice(1)).classList.add('active');renderM(id)}
function closeM(id){let el=document.getElementById('m'+id.charAt(0).toUpperCase()+id.slice(1));if(el)el.classList.remove('active')}
function renderM(id){
  if(id==='shop'){let l=document.getElementById('shopList');l.innerHTML='';
    let tohumDiv=document.createElement('div');tohumDiv.style.cssText='color:#ffe082;font-weight:bold;margin-bottom:5px;font-size:13px';
    tohumDiv.innerHTML='&#127793; Tohumlar';l.appendChild(tohumDiv);
    let grid=document.createElement('div');grid.className='catalog-grid';
    Object.entries(CROPS).forEach(([k,cr])=>{
      let d=document.createElement('div');d.className='catalog-item';
      let cv=document.createElement('canvas');cv.width=50;cv.height=50;
      drawMiniCrop(cv.getContext('2d'),k,50);
      d.appendChild(cv);
      let nm=document.createElement('div');nm.className='catalog-name';nm.textContent=cr.name;d.appendChild(nm);
      let pr=document.createElement('div');pr.className='catalog-price';pr.textContent=cr.buy+' TL';d.appendChild(pr);
      let det=document.createElement('div');det.className='catalog-detail';
      det.innerHTML=`<b>${cr.name}</b><span>Max: ${cr.mk}kg</span><span>Hasat: ${cr.harvestInt} gun</span>`;
      d.appendChild(det);
      d.onclick=()=>buySeed(k,cr);
      grid.appendChild(d);
    });
    l.appendChild(grid);
    let hayvanDiv=document.createElement('div');hayvanDiv.style.cssText='color:#ffe082;font-weight:bold;margin:10px 0 5px;font-size:13px';
    hayvanDiv.innerHTML='&#128004; Hayvanlar';l.appendChild(hayvanDiv);
    let agrid=document.createElement('div');agrid.className='animal-grid';
    Object.entries(ANIM).forEach(([k,a])=>{
      let d=document.createElement('div');d.className='animal-card';
      let cv=document.createElement('canvas');cv.width=60;cv.height=50;
      drawMiniAnimal(cv.getContext('2d'),k,60);
      d.appendChild(cv);
      let nm=document.createElement('div');nm.className='ac-name';nm.textContent=a.name;d.appendChild(nm);
      let info=document.createElement('div');info.className='ac-info';info.textContent=a.prod+' | Yem: '+a.feed+'TL';d.appendChild(info);
      let pr=document.createElement('div');pr.className='ac-price';pr.textContent=a.price+' TL';d.appendChild(pr);
      d.onclick=()=>buyA(k);agrid.appendChild(d);
    });
    l.appendChild(agrid)}
  if(id==='animal'){let l=document.getElementById('animalList');l.innerHTML='';
    let agrid=document.createElement('div');agrid.className='animal-grid';
    Object.entries(ANIM).forEach(([k,a])=>{let cnt=k==='TAVUK'?S.ch:k==='INEK'?S.co:S.sh;let cap=k==='TAVUK'?5+S.st.KUMES:3+S.st.AHIR;
    let d=document.createElement('div');d.className='animal-card';
    let cv=document.createElement('canvas');cv.width=60;cv.height=50;
    drawMiniAnimal(cv.getContext('2d'),k,60);
    d.appendChild(cv);
    let nm=document.createElement('div');nm.className='ac-name';nm.textContent=a.name;d.appendChild(nm);
    let info=document.createElement('div');info.className='ac-info';
    info.innerHTML=`${cnt}/${cap}<br>${a.prod} | Her ${a.int} gun`;d.appendChild(info);
    let btn=document.createElement('button');btn.style.cssText='margin-top:4px;background:#5a8c3a;color:#fff;border:1px solid #8bc34a;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:bold';
    btn.textContent=`Satinal ${a.price} TL`;btn.onclick=()=>buyA(k);d.appendChild(btn);
    agrid.appendChild(d)});
    l.appendChild(agrid)}
  if(id==='storage'){let cap=500+S.st.DEPO*200,used=Object.values(S.inv).reduce((a,b)=>a+b,0);
    document.getElementById('storBar').innerHTML=`<div style="font-size:12px;color:#ccc">${used.toFixed(0)} / ${cap} kg</div><div class="sbar"><div class="sfill" style="width:${Math.min(100,used/cap*100)}%"></div></div>`;
    let l=document.getElementById('storList');l.innerHTML='';
    let grid=document.createElement('div');grid.className='catalog-grid';
    [{k:'DOMATES',n:'Domates',u:'kg'},{k:'PATATES',n:'Patates',u:'kg'},{k:'SALATALIK',n:'Salatalik',u:'kg'},{k:'MARUL',n:'Marul',u:'kg'},{k:'BIBER',n:'Biber',u:'kg'},{k:'PATLICAN',n:'Patlican',u:'kg'},{k:'MISIR',n:'Misir',u:'kg'},{k:'KABAK',n:'Kabak',u:'kg'},{k:'SOGAN',n:'Sogan',u:'kg'},{k:'BUGDAY',n:'Bugday',u:'kg'},{k:'YUMURTA',n:'Yumurta',u:'adet'},{k:'SUT',n:'Sut',u:'litre'},{k:'YUN',n:'Yun',u:'adet'}].forEach(it=>{
      let amt=S.inv[it.k]||0;
      let d=document.createElement('div');d.className='catalog-item';
      d.style.opacity=amt>0?1:0.3;
      let cv=document.createElement('canvas');cv.width=50;cv.height=50;
      let ctx=cv.getContext('2d');
      if(['YUMURTA','SUT','YUN'].includes(it.k))drawMiniProduct(ctx,it.k,50);
      else drawMiniCrop(ctx,it.k,50);
      d.appendChild(cv);
      let nm=document.createElement('div');nm.className='catalog-name';nm.textContent=it.n;d.appendChild(nm);
      let pr=document.createElement('div');pr.className='catalog-price';
      pr.textContent=amt>0?amt.toFixed(0)+' '+it.u:'Bos';pr.style.color=amt>0?'#8bc34a':'#666';d.appendChild(pr);
      grid.appendChild(d)});
    l.appendChild(grid);
    if(!grid.children.length)l.innerHTML='<div style="text-align:center;color:#666;padding:15px">&#128230; Depo bos!</div>'}
}
function buyA(k){let a=ANIM[k];if(S.money<a.price){toast('Yeterli paran yok!');return}
  if(k==='TAVUK'){
    if(!S.built.kumes){toast('Once kumes insa et!');return}
    let cap=5+S.st.KUMES;if(S.ch>=cap){toast('Kumes dolu!');return}S.ch++}
  else if(k==='INEK'){
    if(!S.built.ahir){toast('Once ahir insa et!');return}
    let cap=3+S.st.AHIR;if(S.co>=cap){toast('Ahir dolu!');return}S.co++}
  else if(k==='KOYUN'){
    if(!S.built.ahir){toast('Once ahir insa et!');return}
    let cap=3+S.st.AHIR;if(S.sh>=cap){toast('Ahir dolu!');return}S.sh++}
  S.money-=a.price;toast(`${a.name} alindi!`);updateHUD()}
function buySeed(k,cr){if(S.money<cr.buy){toast('Yeterli paran yok!');return}S.money-=cr.buy;
  S.inv[k]=(S.inv[k]||0)+1;toast(`${cr.name} tohumu alindi! (+1 kg)`);updateHUD();renderM('shop')}

function buyBuilding(k,price,name){
  if(S.built[k]){toast('Zaten insa edildi!');return}
  if(S.money<price){toast('Yeterli paran yok! ('+price+' TL)');return}
  S.money-=price;S.built[k]=true;
  toast(name+' insa edildi!');updateHUD();renderM('shop');
}

function updateHUD(){
  let ck=document.getElementById('clock');ck.textContent=`${String(S.h).padStart(2,'0')}:${String(S.m).padStart(2,'0')}`;
  document.getElementById('hDay').textContent=S.day;
  let ss=document.getElementById('hSeason');ss.textContent=SEASONS[S.sea];
  document.getElementById('hYear').textContent=S.yr;
  document.getElementById('hMoney').textContent=S.money.toLocaleString()+' TL';
  document.getElementById('hWhole').textContent=S.whArr?'Toptanci burada!':`Toptanci: ${String(S.whH).padStart(2,'0')}:${String(S.whM).padStart(2,'0')}`;
  let wNames={gunesli:'Gunesli',bulutlu:'Bulutlu',yagmurlu:'Yagmurlu',karli:'Karli'};
  document.getElementById('hWeather').textContent=WEATHER_ICONS[S.weather]+' '+wNames[S.weather];
  let windIcon=S.windSpeed<5?'&#127794;':S.windSpeed<10?'&#127796;':'&#127744;';
  document.getElementById('hWind').innerHTML=windIcon+' Ruzgar: '+S.windSpeed+' km/h';
}
function toast(m){let t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

const SAVE_VERSION=10;
function save(){S._v=SAVE_VERSION;localStorage.setItem('farm5',JSON.stringify(S))}
function load(){let d=localStorage.getItem('farm5');
  if(d){let l=JSON.parse(d);if(l._v!==SAVE_VERSION){localStorage.removeItem('farm5');return}
    Object.assign(S,l);if(!S.dailyHarvest)S.dailyHarvest={};if(!S.dailyAnimal)S.dailyAnimal={};
    if(S.dailySold===undefined)S.dailySold=0;
    if(!S.built)S.built={degirmen:false,kuyu:false,ahir:false,kumes:false};
    Object.keys(CROPS).forEach(k=>{if(S.dailyHarvest[k]===undefined)S.dailyHarvest[k]=0});
    if(S.dailyAnimal.YUMURTA===undefined)S.dailyAnimal.YUMURTA=0;
    if(S.dailyAnimal.SUT===undefined)S.dailyAnimal.SUT=0;
    if(S.dailyAnimal.YUN===undefined)S.dailyAnimal.YUN=0;
  }
}
function loop(){
  let now=Date.now();
  let dt=(now-lastFrameTime)/1000;
  lastFrameTime=now;
  if(S.built.degirmen){
    let windSpeed=S.windSpeed||5;
    let rotSpeed=windSpeed*0.0015;
    windmillAngle+=rotSpeed*dt*60;
    if(windmillAngle>Math.PI*2)windmillAngle-=Math.PI*2;
  }
  draw();save();requestAnimationFrame(loop)}
load();updateHUD();generateMissions();renderMissions();
setTimeout(()=>{document.getElementById('infoPanel').style.opacity='0'},20000);
loop();
</script>
