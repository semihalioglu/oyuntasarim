<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Çiftlik Simülasyonu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito","Segoe UI",Arial,sans-serif;background:#2d5a1e;overflow:hidden;height:100vh;user-select:none}
canvas{display:block;cursor:pointer}
.hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;padding:4px 14px;background:linear-gradient(180deg,rgba(60,40,20,0.95),rgba(40,25,10,0.95));border-bottom:3px solid #c8956c;z-index:10;height:38px;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,0.4);font-family:'Courier New',monospace}
.hud-clock{font-size:18px;font-weight:bold;color:#ffe082}
.hud-info{font-size:12px;color:#d7ccc8}.hud-info b{color:#fff}
.hud-money{margin-left:auto;font-size:16px;font-weight:bold;color:#ffe082}
.hud-whole{font-size:11px;color:#ce93d8}
.toolbar{position:fixed;bottom:0;left:0;right:0;display:flex;padding:5px 8px;background:linear-gradient(180deg,rgba(60,40,20,0.95),rgba(40,25,10,0.95));border-top:3px solid #c8956c;z-index:10;height:48px;gap:6px;box-shadow:0 -2px 8px rgba(0,0,0,0.4)}
.tb{flex:1;padding:6px;border:2px solid rgba(200,149,108,0.4);border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px;color:#fff;transition:transform .1s;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
.tb:hover{transform:scale(1.05);border-color:#ffe082}.tb:active{transform:scale(0.95)}
.tb.t{background:linear-gradient(180deg,#8b5e3c,#6d4c30)}
.tb.s{background:linear-gradient(180deg,#5a8c3a,#3d6b24)}
.tb.a{background:linear-gradient(180deg,#8b6e3c,#6d5024)}
.tb.d{background:linear-gradient(180deg,#6b5a8c,#4d3c6b)}
.tb.tr{background:linear-gradient(180deg,#7a5a3a,#5d4024)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.active{display:flex}
.modal{background:linear-gradient(135deg,#4a3520,#3a2815);border:3px solid #c8956c;border-radius:10px;padding:14px;max-width:420px;width:92%;max-height:75vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.modal h2{color:#ffe082;text-align:center;margin-bottom:8px;font-size:16px;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
.modal-info{background:rgba(0,0,0,0.3);padding:10px;border-radius:6px;margin-bottom:8px;font-size:13px;line-height:1.5;color:#fff}
.mbtns{display:flex;gap:6px;margin-top:8px}
.mbtns button{flex:1;padding:10px;border:2px solid rgba(200,149,108,0.3);border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px;transition:transform .1s;color:#fff}
.mbtns button:hover{transform:scale(1.04);border-color:#ffe082}
.bs{background:#5a8c3a}.bd{background:#6d4c30}.bw{background:#3a6b8c}.bp{background:#8c7a3a}.br{background:#8c3a3a}.bc{background:#6d5024}
.item{display:flex;align-items:center;background:rgba(0,0,0,0.3);padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:4px;border:1px solid rgba(200,149,108,0.15)}
.item:hover{background:rgba(255,255,255,0.05);border-color:rgba(200,149,108,0.3)}
.item .inf{flex:1}.item .inf .nm{font-weight:bold;font-size:13px;color:#fff}.item .inf .dt{font-size:11px;color:#bbb}
.item .pr{color:#ffe082;font-weight:bold;font-size:13px}
.si{background:rgba(0,0,0,0.3);padding:10px;border-radius:6px;margin-bottom:5px}
.si .sh{display:flex;justify-content:space-between;font-weight:bold;font-size:13px;color:#fff}
.si .sd{font-size:11px;color:#bbb}
.si button{margin-top:4px;background:#5a8c3a;color:#fff;border:1px solid #8bc34a;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:bold}
.sbar{width:100%;height:14px;background:rgba(0,0,0,0.3);border-radius:7px;overflow:hidden;margin:4px 0}
.sfill{height:100%;background:linear-gradient(90deg,#5a8c3a,#ffe082);transition:width .3s}
.sitem{display:flex;justify-content:space-between;padding:5px 8px;background:rgba(0,0,0,0.2);border-radius:4px;margin-bottom:3px;font-size:11px;color:#fff}
.toast{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);background:rgba(60,40,20,0.95);border:2px solid #c8956c;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:bold;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;color:#ffe082;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
.toast.show{opacity:1}
.info-panel{position:fixed;top:44px;left:6px;background:rgba(60,40,20,0.9);border-radius:8px;padding:8px 10px;z-index:10;width:180px;border:2px solid #5a8c3a;transition:opacity .8s;font-size:11px;color:#8bc34a;line-height:1.3;text-shadow:1px 1px 1px rgba(0,0,0,0.5)}
.mission-box{position:fixed;bottom:56px;right:6px;background:rgba(60,40,20,0.95);border:2px solid #c8956c;border-radius:8px;padding:0;z-index:10;width:220px;transition:all .3s;display:none}
.mission-box.show{display:block}
.mission-header{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;cursor:pointer;user-select:none}
.mission-header h4{color:#ffe082;font-size:12px;margin:0}
.mission-toggle{color:#ffe082;font-size:14px;font-weight:bold}
.mission-body{padding:0 8px 8px 8px;max-height:300px;overflow-y:auto;display:block}
.mission-box.collapsed .mission-body{display:none}
.mi{display:flex;align-items:center;gap:5px;margin-bottom:5px;color:#ddd;font-size:11px;line-height:1.2}
.mi.done{color:#8bc34a;text-decoration:line-through}
.mi .check{width:12px;height:12px;border:2px solid #888;border-radius:2px;display:inline-block;flex-shrink:0}
.mi.done .check{background:#8bc34a;border-color:#8bc34a}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:rgba(0,0,0,0.2)}::-webkit-scrollbar-thumb{background:#c8956c;border-radius:2px}
.hud-btn{margin-left:8px;padding:4px 10px;background:linear-gradient(180deg,#8b5e3c,#6d4c30);border:2px solid #c8956c;border-radius:5px;color:#ffe082;font-weight:bold;font-size:12px;cursor:pointer;text-shadow:1px 1px 2px rgba(0,0,0,0.5);transition:transform .1s}
.hud-btn:hover{transform:scale(1.08);border-color:#ffe082}
.hud-btn:active{transform:scale(0.95)}
.tb-icon{font-size:24px;display:block;line-height:1}
.tb-label{font-size:9px;display:block;margin-top:1px;line-height:1}
.tesis-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:8px}
.tesis-item{display:flex;flex-direction:column;align-items:center;width:80px;padding:10px 6px;background:rgba(0,0,0,0.3);border-radius:8px;border:2px solid rgba(200,149,108,0.2);cursor:pointer;transition:transform .1s}
.tesis-item:hover{transform:scale(1.08);border-color:#ffe082}
.tesis-item canvas{border-radius:4px}
.tesis-item span{font-size:10px;color:#ffe082;margin-top:4px;text-align:center;font-weight:bold}
.catalog-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:6px}
.catalog-item{position:relative;width:72px;height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);border-radius:8px;border:2px solid rgba(200,149,108,0.2);cursor:pointer;transition:all .15s;overflow:hidden}
.catalog-item:hover{transform:scale(1.1);border-color:#ffe082;background:rgba(0,0,0,0.6)}
.catalog-item:hover .catalog-detail{display:flex}
.catalog-item canvas{border-radius:4px}
.catalog-item .catalog-name{font-size:8px;color:#ffe082;margin-top:2px;font-weight:bold;text-align:center;line-height:1}
.catalog-item .catalog-price{font-size:8px;color:#8bc34a;font-weight:bold}
.catalog-detail{display:none;position:absolute;bottom:0;left:0;right:0;background:rgba(40,25,10,0.95);padding:4px;border-radius:0 0 6px 6px;flex-direction:column;align-items:center;font-size:8px;color:#ddd;line-height:1.3;border-top:1px solid #c8956c;pointer-events:none}
.catalog-detail b{color:#ffe082}
.animal-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:6px}
.animal-card{display:flex;flex-direction:column;align-items:center;width:90px;padding:8px 4px;background:rgba(0,0,0,0.3);border-radius:8px;border:2px solid rgba(200,149,108,0.2);cursor:pointer;transition:all .15s}
.animal-card:hover{transform:scale(1.05);border-color:#ffe082}
.animal-card canvas{border-radius:4px}
.animal-card .ac-name{font-size:10px;color:#ffe082;margin-top:3px;font-weight:bold}
.animal-card .ac-info{font-size:8px;color:#bbb;text-align:center}
.animal-card .ac-price{font-size:9px;color:#8bc34a;font-weight:bold;margin-top:3px}
.tutorial-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none}
.tutorial-box{background:rgba(30,18,8,0.82);border:2px solid #8bc34a;border-radius:12px;padding:20px 24px;max-width:420px;width:90vw;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.6);backdrop-filter:blur(4px);pointer-events:auto}
.tutorial-box.minimized{max-width:180px;padding:8px 12px;cursor:pointer}
.tutorial-box.minimized .tutorial-title{font-size:12px;margin-bottom:4px}
.tutorial-box.minimized .tutorial-chain,.tutorial-box.minimized .tutorial-btn,.tutorial-box.minimized .tutorial-close{display:none}
.tutorial-title{color:#8bc34a;font-size:18px;font-weight:bold;margin-bottom:16px}
.tutorial-chain{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tutorial-chain .tc-item{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid #5d4037;background:rgba(0,0,0,0.3);transition:all .3s}
.tutorial-chain .tc-item.active{border-color:#ff9800;background:rgba(255,152,0,0.2);box-shadow:0 0 8px rgba(255,152,0,0.4)}
.tutorial-chain .tc-item.done{border-color:#4caf50;background:rgba(76,175,80,0.2)}
.tutorial-chain .tc-arrow{color:#666;font-size:16px}
.tutorial-btn{background:linear-gradient(180deg,#5a8c3a,#3d6b24);color:#fff;border:2px solid #8bc34a;padding:10px 32px;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:8px}
.tutorial-btn:hover{transform:scale(1.03)}
.tutorial-close{position:absolute;top:8px;right:12px;background:none;border:none;color:#999;font-size:18px;cursor:pointer}
.tutorial-minimize{position:absolute;top:4px;left:8px;background:none;border:none;color:#ff9800;font-size:16px;cursor:pointer;z-index:5}
.tutorial-step-popup{position:fixed;right:16px;top:50%;transform:translateY(-50%);background:rgba(30,18,8,0.75);border:2px solid #ff9800;border-radius:10px;padding:14px 18px;max-width:220px;z-index:210;box-shadow:0 4px 16px rgba(0,0,0,0.5);backdrop-filter:blur(4px);pointer-events:none}
.tutorial-step-num{color:#ff9800;font-size:12px;font-weight:bold;margin-bottom:6px}
.tutorial-step-text{color:#ffe082;font-size:13px;line-height:1.4}
.tutorial-step-text .step-action{display:inline-block;margin-top:8px;padding:6px 14px;background:#2e7d32;color:#fff;border-radius:6px;font-size:11px;font-weight:bold}
.login-bg{position:fixed;inset:0;background:linear-gradient(135deg,#1a0f07,#2d1a0a);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column}
.login-box{background:linear-gradient(135deg,#4a3520,#3a2815);border:3px solid #c8956c;border-radius:12px;padding:24px;width:320px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.login-box h2{color:#ffe082;text-align:center;margin-bottom:16px;font-size:20px;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
.login-box .field{margin-bottom:12px}
.login-box label{display:block;color:#d7ccc8;font-size:12px;margin-bottom:4px}
.login-box input{width:100%;padding:10px;border:2px solid #8d6e63;border-radius:6px;background:rgba(0,0,0,0.3);color:#fff;font-size:14px;outline:none;transition:border-color .2s}
.login-box input:focus{border-color:#ffe082}
.login-box .login-btn{width:100%;padding:12px;border:none;border-radius:6px;font-weight:bold;font-size:14px;cursor:pointer;transition:transform .1s;margin-top:4px}
.login-box .login-btn:active{transform:scale(0.97)}
.login-box .login-btn.primary{background:linear-gradient(180deg,#5a8c3a,#3d6b24);color:#fff;border:2px solid #8bc34a}
.login-box .login-btn.secondary{background:linear-gradient(180deg,#8b5e3c,#6d4c30);color:#ffe082;border:2px solid #c8956c;margin-top:8px}
.login-box .login-btn:hover{transform:scale(1.02)}
.login-logo{font-size:48px;margin-bottom:12px;text-align:center}
.login-error{color:#ef9a9a;font-size:11px;margin-top:6px;display:none;text-align:center}
.login-tabs{display:flex;gap:0;margin-bottom:16px}
.login-tab{flex:1;padding:8px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:#8d6e63;font-weight:bold;font-size:13px;transition:all .2s}
.login-tab.active{color:#ffe082;border-bottom-color:#ffe082}
@media screen and (max-height:500px){
  .hud{height:28px;padding:2px 6px;font-size:10px;gap:4px}
  .hud-clock{font-size:12px}.hud-info{font-size:9px}.hud-money{font-size:11px}
  .hud-btn{padding:2px 6px;font-size:9px}
  .hud-whole{display:none}
  .toolbar{height:38px;padding:2px 4px}
  .tb{padding:3px;font-size:10px}
  .tb-icon{font-size:18px}.tb-label{font-size:7px}
  .modal{max-height:85vh;padding:8px;max-width:95%}
  .info-panel{top:32px;width:140px;font-size:9px;padding:4px 6px}
  .mission-box{bottom:44px;width:180px}
  .toast{bottom:44px;font-size:11px}
  .login-bg{flex-direction:row;padding:6px}
  .login-box{width:240px;padding:10px;max-height:90vh;overflow-y:auto}
  .login-logo{font-size:24px;margin-bottom:4px}
  .login-box .field{margin-bottom:4px}
  .login-box label{font-size:9px;margin-bottom:2px}
  .login-box input{padding:6px 7px;font-size:11px}
  .login-box .login-btn{padding:7px;font-size:11px}
  .login-tab{font-size:10px;padding:4px}
  .login-tabs{margin-bottom:8px}
}
@media screen and (max-width:480px){
  .hud{height:30px;padding:2px 6px;gap:4px;flex-wrap:nowrap;overflow-x:auto}
  .hud-clock{font-size:13px}.hud-info{font-size:9px}.hud-money{font-size:12px}
  .hud-btn{padding:2px 6px;font-size:9px}
  .hud-whole,.hud-info:nth-child(n+4){display:none}
  .toolbar{height:44px;padding:3px 4px;gap:3px}
  .tb{padding:4px 2px;font-size:10px}
  .tb-icon{font-size:18px}.tb-label{font-size:7px}
  .modal{max-height:80vh;padding:8px;width:96%}
  .info-panel{display:none}
  .mission-box{width:170px;font-size:10px}
}
@media screen and (max-height:350px){
  .hud{height:28px;padding:1px 6px}
  .hud-clock{font-size:12px}.hud-info{font-size:8px}.hud-money{font-size:11px}
  .toolbar{height:36px;padding:2px 4px}
  .tb-icon{font-size:16px}.tb-label{display:none}
}
@media screen and (orientation:landscape) and (max-height:420px){
  .hud{height:24px;padding:1px 4px;font-size:9px;gap:3px}
  .hud-clock{font-size:11px}.hud-info{font-size:8px}.hud-money{font-size:10px}
  .hud-btn{padding:1px 5px;font-size:8px}
  .hud-whole,.hud-info:nth-child(n+5){display:none}
  .toolbar{height:32px;padding:2px 3px}
  .tb{padding:2px;font-size:9px}
  .tb-icon{font-size:16px}.tb-label{font-size:6px}
  .info-panel{display:none}
  .mission-box{display:none!important}
}
@media screen and (orientation:portrait) and (max-width:400px){
  .login-box{width:95vw;padding:16px}
  .login-logo{font-size:36px}
}
</style>
</head>
<body>
<div class="login-bg" id="loginBg">
  <div class="login-box">
    <div class="login-logo">🌾🐄</div>
    <div class="login-tabs">
      <div class="login-tab active" onclick="showLoginTab('login')">Giriş Yap</div>
      <div class="login-tab" onclick="showLoginTab('register')">Kayıt Ol</div>
    </div>
    <div id="loginForm">
      <div class="field"><label>Kullanıcı Adı</label><input type="text" id="loginUser" placeholder="Kullanıcı adı"></div>
      <div class="field"><label>Şifre</label><input type="password" id="loginPass" placeholder="Şifre"></div>
      <div class="login-error" id="loginErr"></div>
      <button class="login-btn primary" onclick="doLogin()">Giriş Yap</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="field"><label>Kullanıcı Adı</label><input type="text" id="regUser" placeholder="Kullanıcı adı (min 3 karakter)"></div>
      <div class="field"><label>Şifre</label><input type="password" id="regPass" placeholder="Şifre (min 4 karakter)"></div>
      <div class="field"><label>Şifre Tekrar</label><input type="password" id="regPass2" placeholder="Şifre tekrar"></div>
      <div class="login-error" id="regErr"></div>
      <button class="login-btn primary" onclick="doRegister()">Kayıt Ol</button>
    </div>
    <button class="login-btn secondary" onclick="doGuestLogin()" style="width:100%;margin-top:12px">🎭 Misafir Girişi</button>
  </div>
</div>
<canvas id="c"></canvas>
<div class="hud">
    <div class="hud-clock" id="clock">06:00</div>
    <div class="hud-info">Gün <b id="hDay">1</b></div>
    <div class="hud-info" id="hSeason">İlkbahar</div>
    <div class="hud-info">Yıl <b id="hYear">1</b></div>
    <div class="hud-whole" id="hWhole">Toptancı: 12:30</div>
    <div class="hud-info" id="hWeather" style="font-size:13px">Güneşli</div>
    <div class="hud-info" id="hWind" style="font-size:12px">Rüzgar: 5 km/h</div>
    <button class="hud-btn" onclick="advanceTime()">+10 DK</button>
    <button class="hud-btn" onclick="doLogout()" title="Çıkış">🚪</button>
    <div class="hud-money" id="hMoney">5.000 TL</div>
</div>
<div class="mission-box" id="missionBox">
    <div class="mission-header">
        <h4>Günlük Görev</h4>
    </div>
    <div class="mission-body" id="missionBody"><div id="missionList"></div></div>
</div>
<div class="toolbar">
    <button class="tb s" onclick="openM('shop')"><span class="tb-icon">&#127793;</span></button>
    <button class="tb d" onclick="openM('storage')"><span class="tb-icon">&#128230;</span></button>
    <button class="tb tr" onclick="activateTraktör()"><span class="tb-icon">&#128668;</span></button>
    <button class="tb tf" onclick="openTesisler()"><span class="tb-icon">&#127981;</span></button>
    <button class="tb" onclick="toggleMissions()" style="background:#6d4c41"><span class="tb-icon">&#128203;</span></button>
    <button class="tb tut" onclick="openTutorial()" style="background:#2e7d32"><span class="tb-icon">&#128218;</span></button>
</div>
<div class="info-panel" id="infoPanel">Sebze ekimi yaparak başla!</div>
<div class="modal-bg" id="mShop"><div class="modal"><h2>Mağaza</h2><div id="shopList"></div><div class="mbtns"><button class="bc" onclick="closeM('shop')">Kapat</button></div></div></div>
<div class="modal-bg" id="mAnimal"><div class="modal"><h2>Hayvanlar</h2><div id="animalList"></div><div class="mbtns"><button class="bc" onclick="closeM('animal')">Kapat</button></div></div></div>
<div class="modal-bg" id="mStorage"><div class="modal"><h2>Ürün Deposu</h2><div id="storBar"></div><div id="storList"></div><div class="mbtns"><button class="bc" onclick="closeM('storage')">Kapat</button></div></div></div>

function getUsers(){try{return JSON.parse(localStorage.getItem('farm_users')||'{}')}catch(e){return{}}}
function saveUsers(u){localStorage.setItem('farm_users',JSON.stringify(u))}
function showLoginTab(t){
  document.querySelectorAll('.login-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('loginForm').style.display=t==='login'?'block':'none';
  document.getElementById('registerForm').style.display=t==='register'?'block':'none';
  document.querySelectorAll('.login-tab')[t==='login'?0:1].classList.add('active');
  document.getElementById('loginErr').style.display='none';
  document.getElementById('regErr').style.display='none';
}
function showErr(id,msg){let e=document.getElementById(id);e.textContent=msg;e.style.display='block'}
function doLogin(){
  let u=document.getElementById('loginUser').value.trim();
  let p=document.getElementById('loginPass').value;
  if(!u||!p){showErr('loginErr','Kullanıcı adı ve sifre gerekli');return}
  let users=getUsers();
  if(!users[u]){showErr('loginErr','Boyle bir kullanici yok');return}
  if(users[u]!==p){showErr('loginErr','Şifre hatalı');return}
  sessionStorage.setItem('farm_user',u);
  startGame();
}
function doRegister(){
  let u=document.getElementById('regUser').value.trim();
  let p=document.getElementById('regPass').value;
  let p2=document.getElementById('regPass2').value;
  if(!u||u.length<3){showErr('regErr','Kullanıcı adı en az 3 karakter');return}
  if(!p||p.length<4){showErr('regErr','Şifre en az 4 karakter');return}
  if(p!==p2){showErr('regErr','Şifreler eşleşmiyor');return}
  let users=getUsers();
  if(users[u]){showErr('regErr','Bu kullanici adi zaten var');return}
  users[u]=p;saveUsers(users);
  sessionStorage.setItem('farm_user',u);
  startGame();
}
function doGuestLogin(){
  localStorage.removeItem('farm5');
  sessionStorage.setItem('farm_user','Misafir');
  location.reload();
}
function doLogout(){
  sessionStorage.removeItem('farm_user');

function calcLayout(){
  let toolbarH=48,hudH=38;
  ISLANDSCAPE=W>H;
  let areaH=H-hudH-toolbarH-4;
  let areaW=W-8;
  if(ISLANDSCAPE){
    CL=Math.min(Math.floor(areaW/17),Math.floor(areaH/9),40);
    sceneTop=hudH+Math.floor(areaH*0.16);
    GX=(W-COLS*CL)/2;
    GY=hudH+Math.floor(areaH*0.28);
  }else{
    let pad=Math.floor(W*0.22);
    CL=Math.min(Math.floor((areaW-pad*2)/COLS),Math.floor(areaH/13),34);
    sceneTop=hudH+Math.floor(areaH*0.06);
    GX=pad+Math.floor((areaW-pad*2-COLS*CL)/2);
    GY=hudH+Math.floor(areaH*0.40);
  }
}
calcLayout();window.addEventListener('resize',()=>{calcLayout()});

function drawPixelRect(x,y,w,h,color){
  X.fillStyle=color;X.fillRect(Math.floor(x),Math.floor(y),Math.ceil(w),Math.ceil(h));
}

function getDaylight(){
  let t=S.h+S.m/60;
  if(t>=5&&t<7)return(t-5)/2;
  if(t>=7&&t<17)return 1;
  if(t>=17&&t<20)return 1-(t-17)/3;
  return 0;
}
function drawSky(){
  let skyH=sceneTop-5;
  let dl=getDaylight();
  let nightAlpha=1-dl;
  let g=X.createLinearGradient(0,0,0,skyH);
  if(S.weather==='karlı'){
    g.addColorStop(0,`rgba(180,195,210,${0.3+dl*0.7})`);
    g.addColorStop(0.5,`rgba(200,210,220,${0.3+dl*0.7})`);
    g.addColorStop(1,`rgba(210,220,215,${0.3+dl*0.7})`);
  }else if(S.weather==='yağmurlu'){
    g.addColorStop(0,`rgba(120,130,145,${0.4+dl*0.6})`);
    g.addColorStop(0.5,`rgba(140,150,160,${0.4+dl*0.6})`);
    g.addColorStop(1,`rgba(160,170,165,${0.4+dl*0.6})`);
  }else if(S.weather==='bulutlu'){
    g.addColorStop(0,`rgba(170,190,210,${0.5+dl*0.5})`);
    g.addColorStop(0.5,`rgba(190,205,220,${0.5+dl*0.5})`);
    g.addColorStop(1,`rgba(200,215,200,${0.5+dl*0.5})`);
  }else{
    g.addColorStop(0,`rgba(40,60,${80+dl*100},${0.3+dl*0.7})`);
    g.addColorStop(0.3,`rgba(135,206,235,${0.3+dl*0.7})`);
    g.addColorStop(0.7,`rgba(176,224,255,${0.3+dl*0.7})`);
    g.addColorStop(1,`rgba(200,230,200,${0.3+dl*0.7})`);
  }
  X.fillStyle=g;X.fillRect(0,0,W,skyH);
  // Gunes veya ay
  let sunY=skyH*0.3+skyH*0.4*(1-dl);
  let sunX=W*0.6;
  // Gunes etrafindaki kararmis bolge (dogma/batma)
  let hourF=S.h+S.m/60;
  let sunGlowAlpha=0;
  if(hourF>=5&&hourF<7)sunGlowAlpha=(1-(hourF-5)/2)*0.4;
  else if(hourF>=17&&hourF<20)sunGlowAlpha=((hourF-17)/3)*0.4;
  if(sunGlowAlpha>0.01){
    let glowR=skyH*0.6;
    let sgGrd=X.createRadialGradient(sunX,sunY,0,sunX,sunY,glowR);
    sgGrd.addColorStop(0,`rgba(255,180,50,${sunGlowAlpha*0.6})`);
    sgGrd.addColorStop(0.3,`rgba(255,120,30,${sunGlowAlpha*0.3})`);
    sgGrd.addColorStop(0.6,`rgba(180,60,20,${sunGlowAlpha*0.15})`);
    sgGrd.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=sgGrd;
    X.beginPath();X.arc(sunX,sunY,glowR,0,Math.PI*2);X.fill();
  }
  if(dl>0.1){
    X.fillStyle=`rgba(255,220,50,${dl*0.9})`;
    X.beginPath();X.arc(sunX,sunY,18,0,Math.PI*2);X.fill();
    X.fillStyle=`rgba(255,240,150,${dl*0.3})`;
    X.beginPath();X.arc(sunX,sunY,28,0,Math.PI*2);X.fill();
  }
  if(dl<0.5){
    X.fillStyle=`rgba(220,230,250,${(0.5-dl)*1.5})`;
    X.beginPath();X.arc(sunX,sunY,12,0,Math.PI*2);X.fill();
  }
  // Bulutlar
  let cloudCount=S.weather==='güneşli'?3:S.weather==='bulutlu'?8:S.weather==='yağmurlu'?10:6;
  let cloudAlpha=S.weather==='güneşli'?0.5:S.weather==='bulutlu'?0.7:0.8;
  let t=Date.now()/8000;
  for(let i=0;i<cloudCount;i++){
    let cx=(W*0.1+i*W*0.12+Math.sin(t+i*0.8)*15)%W;
    let cy=12+Math.sin(t*0.5+i*2)*6+i%3*10;
    X.fillStyle=S.weather==='yağmurlu'?`rgba(120,130,140,${cloudAlpha})`:
                S.weather==='karlı'?`rgba(190,200,210,${cloudAlpha})`:`rgba(255,255,255,${cloudAlpha})`;
    X.beginPath();X.arc(cx,cy,12+i%3*3,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx-10,cy+3,10+i%2*2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+10,cy+3,10+i%2*2,0,Math.PI*2);X.fill();
  }
  // Yagmur efekti
  if(S.weather==='yağmurlu'){
    X.strokeStyle='rgba(150,180,220,0.5)';X.lineWidth=1;
    for(let i=0;i<rainDrops.length;i++){
      let rd=rainDrops[i];
      X.beginPath();X.moveTo(rd.x,rd.y);X.lineTo(rd.x-2,rd.y+8);X.stroke();
      rd.y+=rd.spd;rd.x-=1;
      if(rd.y>H-48){rainDrops[i]={x:Math.random()*W,y:-5,spd:4+Math.random()*4}}
    }
  }
  // Kar efekti
  if(S.weather==='karlı'){
    X.fillStyle='rgba(255,255,255,0.8)';
    for(let i=0;i<snowFlakes.length;i++){
      let sf=snowFlakes[i];
      X.beginPath();X.arc(sf.x,sf.y,sf.r,0,Math.PI*2);X.fill();
      sf.y+=sf.spd;sf.x+=Math.sin(Date.now()/1000+i)*0.5;
      if(sf.y>H-48){snowFlakes[i]={x:Math.random()*W,y:-5,r:1+Math.random()*2,spd:1+Math.random()*2}}
    }
  }
  // Gun isigi overlay (gece karanligi)
  if(nightAlpha>0.05){
    X.fillStyle=`rgba(10,10,40,${nightAlpha*0.55})`;
    X.fillRect(0,0,W,H);
  }
}

function drawMountains(){

  }
  X.lineTo(W,baseY);X.closePath();X.fill();
  X.fillStyle='#4a7a3a';

    X.lineTo(x,baseY-15-Math.sin(x*0.005+1)*18-Math.cos(x*0.003)*10);
  }
  X.lineTo(W,baseY);X.closePath();X.fill();
}

function drawGrassBackground(){

  X.fillStyle=g;X.fillRect(0,sceneTop-5,W,H-sceneTop+5);
  for(let i=0;i<80;i++){
    let gx=(i*173+23)%W,gy=sceneTop+((i*293+47)%(H-sceneTop-50));
    X.strokeStyle=i%3?'rgba(80,180,50,0.3)':'rgba(60,140,30,0.25)';
    X.lineWidth=0.8;
    X.beginPath();X.moveTo(gx,gy);X.lineTo(gx+1,gy-4-i%3);X.stroke();
  }
}

function drawDirtPath(x1,y1,x2,y2,width){
  X.fillStyle='rgba(160,120,70,0.6)';
  let dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  let nx=-dy/len*width/2,ny=dx/len*width/2;
  X.beginPath();
  X.moveTo(x1+nx,y1+ny);X.lineTo(x2+nx,y2+ny);
  X.lineTo(x2-nx,y2-ny);X.lineTo(x1-nx,y1-ny);
  X.closePath();X.fill();
  X.fillStyle='rgba(140,100,55,0.3)';
  for(let i=0;i<len;i+=12){
    let t=i/len;
    let px=x1+dx*t+(Math.sin(i*0.5)*3);
    let py=y1+dy*t;
    X.beginPath();X.ellipse(px,py,2,1,0,0,Math.PI*2);X.fill();
  }
}

function drawFenceSegment(x1,y1,x2,y2){
  let dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  let ux=dx/len,uy=dy/len;
  X.strokeStyle='#6d4c41';X.lineWidth=2;
  X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();
  X.beginPath();X.moveTo(x1,y1-4);X.lineTo(x2,y2-4);X.stroke();
  let posts=Math.floor(len/15);
  for(let i=0;i<=posts;i++){
    let px=x1+ux*i*15,py=y1+uy*i*15;
    X.fillStyle='#5d4037';X.fillRect(px-1.5,py-6,3,8);
    X.fillStyle='#4e342e';X.beginPath();X.arc(px,py-6,2,0,Math.PI*2);X.fill();
  }
}

function drawHouse(x,y,s){
  X.save();X.translate(x,y);

  // Gölge
  X.fillStyle='rgba(0,0,0,0.15)';X.beginPath();X.ellipse(0,s*0.82,s*0.85,s*0.1,0,0,Math.PI*2);X.fill();

  // Taş temel
  let stoneColors=['#9e9e9e','#bdbdbd','#8d8d8d','#a8a8a8'];
  for(let i=0;i<Math.ceil(s*0.6/6);i++){
    for(let j=0;j<4;j++){
      let sx=-s*0.52+j*s*0.27+(i%2)*s*0.13;
      let sy=s*0.78-i*6;
      X.fillStyle=stoneColors[(i+j)%4];
      X.beginPath();X.roundRect(sx,sy,s*0.25,5,1);X.fill();

  }

  // Tahta kenar çerçevesi
  X.fillStyle='#5d4037';X.fillRect(-s*0.52,s*0.08,s*1.04,s*0.03);

  X.fillRect(-s*0.52,s*0.08,s*0.03,s*0.73);
  X.fillRect(s*0.49,s*0.08,s*0.03,s*0.73);

  // Çatı - kiremit desenli
  X.fillStyle='#8B4513';
  X.beginPath();X.moveTo(-s*0.62,s*0.1);X.lineTo(0,-s*0.32);X.lineTo(s*0.62,s*0.1);X.closePath();X.fill();
  // Çatı katmanları - kiremit sıraları
  for(let i=0;i<6;i++){
    let ry=s*0.1-i*s*0.068;
    let rw=s*(0.62-i*0.08);
    X.fillStyle=i%2?'#A0522D':'#7B3F00';
    X.beginPath();X.moveTo(-rw,ry);X.lineTo(rw,ry);X.lineTo(rw-s*0.02,ry-s*0.065);X.lineTo(-rw+s*0.02,ry-s*0.065);X.closePath();X.fill();
    // Kiremit dikey çizgileri

    for(let j=-rw+s*0.04;j<rw;j+=s*0.08){
      X.beginPath();X.moveTo(j,ry);X.lineTo(j-s*0.01,ry-s*0.065);X.stroke();
    }
  }
  // Çatı kenar bordür
  X.strokeStyle='#5d4037';X.lineWidth=2;
  X.beginPath();X.moveTo(-s*0.62,s*0.1);X.lineTo(0,-s*0.32);X.lineTo(s*0.62,s*0.1);X.stroke();

  // Bacak - tuğla desenli
  X.fillStyle='#8B4513';X.fillRect(s*0.15,-s*0.28,s*0.1,s*0.32);
  for(let i=0;i<4;i++){
    X.fillStyle=i%2?'#9B5B43':'#7B3523';
    X.fillRect(s*0.15,-s*0.25+i*s*0.08,s*0.1,s*0.07);
    X.strokeStyle='rgba(0,0,0,0.15)';X.lineWidth=0.5;
    X.strokeRect(s*0.15,-s*0.25+i*s*0.08,s*0.1,s*0.07);
  }
  X.fillStyle='#555';X.beginPath();X.arc(s*0.2,-s*0.3,s*0.045,0,Math.PI*2);X.fill();
  // Duman animasyonu
  let t=Date.now()/1000;
  for(let i=0;i<3;i++){
    let dx=s*0.2+Math.sin(t*1.5+i*2)*s*0.04;
    let dy=-s*0.35-i*s*0.08-Math.sin(t+i)*s*0.02;
    let dr=s*0.03+i*s*0.015;
    let alpha=0.35-i*0.1;
    X.fillStyle=`rgba(180,180,180,${alpha})`;

  }

  // Kapı - detaylı

  X.fillStyle='#4e342e';X.fillRect(-s*0.1,s*0.37,s*0.2,s*0.39);
  // Kapı çerçevesi
  X.strokeStyle='#8d6e63';X.lineWidth=1.5;X.strokeRect(-s*0.1,s*0.37,s*0.2,s*0.39);
  // Kapı paneelleri
  X.strokeStyle='rgba(0,0,0,0.15)';X.lineWidth=0.8;
  X.strokeRect(-s*0.07,s*0.39,s*0.14,s*0.15);
  X.strokeRect(-s*0.07,s*0.56,s*0.14,s*0.15);
  // Kapı kulpu
  X.fillStyle='#ffe082';X.beginPath();X.arc(s*0.06,s*0.58,2,0,Math.PI*2);X.fill();
  // Kapı üstü sundurma
  X.fillStyle='#654321';
  X.beginPath();X.moveTo(-s*0.2,s*0.35);X.lineTo(0,s*0.28);X.lineTo(s*0.2,s*0.35);X.closePath();X.fill();
  X.strokeStyle='#5d4037';X.lineWidth=1;X.beginPath();X.moveTo(-s*0.2,s*0.35);X.lineTo(0,s*0.28);X.lineTo(s*0.2,s*0.35);X.stroke();

  // Pencereler - sol
  let winW=s*0.13,winH=s*0.1;
  X.fillStyle='#87CEEB';X.fillRect(-s*0.42,s*0.22,winW,winH);
  X.fillStyle='rgba(255,255,255,0.25)';X.fillRect(-s*0.4,s*0.24,winW*0.4,winH*0.4);
  X.strokeStyle='#5d4037';X.lineWidth=1.5;X.strokeRect(-s*0.42,s*0.22,winW,winH);
  X.beginPath();X.moveTo(-s*0.42+winW/2,s*0.22);X.lineTo(-s*0.42+winW/2,s*0.22+winH);X.stroke();
  X.beginPath();X.moveTo(-s*0.42,s*0.22+winH/2);X.lineTo(-s*0.42+winW,s*0.22+winH/2);X.stroke();
  // Çiçek kutusu - sol pencere
  X.fillStyle='#6d4c41';X.fillRect(-s*0.44,s*0.22+winH+2,winW+4,6);
  let cf1=['#e91e63','#ff9800','#ffeb3b','#9c27b0'];
  for(let i=0;i<4;i++){
    let cfx=-s*0.43+i*(winW+2)/4+3;
    X.fillStyle='#4caf50';X.fillRect(cfx,s*0.22+winH-2,1.5,4);
    X.fillStyle=cf1[i];
    X.beginPath();X.arc(cfx,s*0.22+winH-3,2.5,0,Math.PI*2);X.fill();
  }

  // Pencereler - sağ
  X.fillStyle='#87CEEB';X.fillRect(s*0.29,s*0.22,winW,winH);
  X.fillStyle='rgba(255,255,255,0.25)';X.fillRect(s*0.31,s*0.24,winW*0.4,winH*0.4);
  X.strokeStyle='#5d4037';X.lineWidth=1.5;X.strokeRect(s*0.29,s*0.22,winW,winH);
  X.beginPath();X.moveTo(s*0.29+winW/2,s*0.22);X.lineTo(s*0.29+winW/2,s*0.22+winH);X.stroke();
  X.beginPath();X.moveTo(s*0.29,s*0.22+winH/2);X.lineTo(s*0.29+winW,s*0.22+winH/2);X.stroke();
  // Çiçek kutusu - sağ pencere
  X.fillStyle='#6d4c41';X.fillRect(s*0.27,s*0.22+winH+2,winW+4,6);
  for(let i=0;i<4;i++){
    let cfx=s*0.28+i*(winW+2)/4+3;
    X.fillStyle='#4caf50';X.fillRect(cfx,s*0.22+winH-2,1.5,4);
    X.fillStyle=cf1[(i+2)%4];
    X.beginPath();X.arc(cfx,s*0.22+winH-3,2.5,0,Math.PI*2);X.fill();
  }

  // Veranda / teras - evin onu
  X.fillStyle='#8d6e63';X.fillRect(-s*0.35,s*0.8,s*0.7,s*0.08);
  // Ahşap döşeme çizgileri
  X.strokeStyle='rgba(0,0,0,0.1)';X.lineWidth=0.5;
  for(let i=0;i<7;i++){X.beginPath();X.moveTo(-s*0.35+i*s*0.1,s*0.8);X.lineTo(-s*0.35+i*s*0.1,s*0.88);X.stroke()}
  // Veranda sütunları
  X.fillStyle='#a1887f';X.fillRect(-s*0.33,s*0.35,3,s*0.45);
  X.fillRect(s*0.3,s*0.35,3,s*0.45);
  // Sütun başlıkları
  X.fillStyle='#8d6e63';X.fillRect(-s*0.35,s*0.34,7,3);X.fillRect(s*0.28,s*0.34,7,3);

  // Kapı yanında çiçek saksıları
  // Sol saksı
  X.fillStyle='#a1887f';X.beginPath();X.moveTo(-s*0.22,s*0.8);X.lineTo(-s*0.18,s*0.8);X.lineTo(-s*0.19,s*0.72);X.lineTo(-s*0.21,s*0.72);X.closePath();X.fill();
  X.fillStyle='#e91e63';X.beginPath();X.arc(-s*0.2,s*0.7,s*0.03,0,Math.PI*2);X.fill();
  X.fillStyle='#4caf50';X.fillRect(-s*0.2,s*0.7,1.5,s*0.04);

}

function drawBarn(x,y,s){
  X.save();X.translate(x,y);

  // Gölge
  X.fillStyle='rgba(0,0,0,0.15)';X.beginPath();X.ellipse(0,s*0.82,s*0.95,s*0.1,0,0,Math.PI*2);X.fill();

  // Taş temel
  let stoneC2=['#9e9e9e','#b0b0b0','#888','#a5a5a5'];
  for(let i=0;i<Math.ceil(s*0.5/5);i++){
    for(let j=0;j<5;j++){
      let sx=-s*0.55+j*s*0.23+(i%2)*s*0.11;
      let sy=s*0.78-i*5;
      X.fillStyle=stoneC2[(i+j)%4];
      X.beginPath();X.roundRect(sx,sy,s*0.21,4,1);X.fill();
    }
  }

  // Ahır gövdesi - kırmızı tahta
  let barnColors=['#8B2500','#A03000','#7B1E00','#B03800','#922E00'];
  for(let i=0;i<8;i++){
    X.fillStyle=barnColors[i%barnColors.length];
    X.fillRect(-s*0.55,s*0.12+i*s*0.085,s*1.1,s*0.085);
    X.strokeStyle='rgba(0,0,0,0.1)';X.lineWidth=0.5;
    X.beginPath();X.moveTo(-s*0.55,s*0.12+i*s*0.085);X.lineTo(s*0.55,s*0.12+i*s*0.085);X.stroke();
  }
  // Dikey destek ahşapları
  X.fillStyle='#5B0E00';
  X.fillRect(-s*0.55,s*0.12,3,s*0.68);
  X.fillRect(s*0.52,s*0.12,3,s*0.68);
  X.fillRect(-s*0.01,s*0.12,2,s*0.68);

  // Çatı - geniş ahır çatısı
  X.fillStyle='#6B1800';
  X.beginPath();X.moveTo(-s*0.65,s*0.12);X.lineTo(0,-s*0.28);X.lineTo(s*0.65,s*0.12);X.closePath();X.fill();
  // Çatı kiremit
  for(let i=0;i<5;i++){
    let ry=s*0.12-i*s*0.075;
    let rw=s*(0.65-i*0.11);
    X.fillStyle=i%2?'#7B2800':'#5B0E00';
    X.beginPath();X.moveTo(-rw,ry);X.lineTo(rw,ry);X.lineTo(rw-s*0.02,ry-s*0.07);X.lineTo(-rw+s*0.02,ry-s*0.07);X.closePath();X.fill();
    X.strokeStyle='rgba(0,0,0,0.1)';X.lineWidth=0.5;
    for(let j=-rw+s*0.05;j<rw;j+=s*0.09){
      X.beginPath();X.moveTo(j,ry);X.lineTo(j-s*0.01,ry-s*0.07);X.stroke();
    }
  }
  // Çatı kenar bordür
  X.strokeStyle='#4a1000';X.lineWidth=2;
  X.beginPath();X.moveTo(-s*0.65,s*0.12);X.lineTo(0,-s*0.28);X.lineTo(s*0.65,s*0.12);X.stroke();
  // Çatı tepesi
  X.fillStyle='#5B0E00';X.fillRect(-s*0.08,-s*0.3,s*0.16,s*0.04);

  // "AHİR" tabelası - zeminin hemen altında, büyük ve okunaklı
  X.fillStyle='#d4a040';
  X.beginPath();X.roundRect(-s*0.22,s*0.0,s*0.44,s*0.13,3);X.fill();
  X.strokeStyle='#8d6e63';X.lineWidth=1.5;X.strokeRect(-s*0.22,s*0.0,s*0.44,s*0.13);
  X.fillStyle='#3a2010';X.font=`bold ${s*0.1}px "Nunito",Arial,sans-serif`;X.textAlign='center';X.textBaseline='middle';
  X.fillText('AHİR',0,s*0.065);
  X.textBaseline='alphabetic';

  // Ahır kapısı - çift kanat, ortalanmış
  let doorW=s*0.35,doorH=s*0.42;
  let doorTop=s*0.46-doorH/2;
  X.fillStyle='#3e2723';X.fillRect(-doorW/2,doorTop,doorW,doorH);
  // Sol kanat
  X.fillStyle='#2d1b12';X.fillRect(-doorW/2,doorTop,doorW/2-1,doorH);
  // Sağ kanat
  X.fillRect(1,doorTop,doorW/2-1,doorH);
  // Kapı çizgileri
  X.strokeStyle='#1a0f0a';X.lineWidth=1;
  X.strokeRect(-doorW/2,doorTop,doorW/2-1,doorH);
  X.strokeRect(1,doorTop,doorW/2-1,doorH);
  // Çapraz desen
  X.strokeStyle='rgba(100,80,60,0.3)';X.lineWidth=0.8;
  X.beginPath();X.moveTo(-doorW/2,doorTop);X.lineTo(-1,doorTop+doorH);X.stroke();
  X.beginPath();X.moveTo(doorW/2,doorTop);X.lineTo(1,doorTop+doorH);X.stroke();
  // İçerisi karanlık
  X.fillStyle='rgba(10,5,0,0.6)';X.fillRect(-doorW/2+3,doorTop+3,doorW-6,doorH-3);
  // İçerde saman balyası silueti
  X.fillStyle='rgba(200,180,100,0.15)';X.fillRect(-doorW/2+5,doorTop+doorH-8,doorW*0.3,6);
  X.fillStyle='rgba(200,180,100,0.1)';X.fillRect(-doorW/2+doorW*0.4,doorTop+doorH-6,doorW*0.25,4);
  // Kapı kulpları
  X.fillStyle='#ffe082';X.beginPath();X.arc(-4,doorTop+doorH/2,2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(4,doorTop+doorH/2,2,0,Math.PI*2);X.fill();

  // Pencere - sol taraf
  let pw=s*0.08,ph=s*0.07;
  X.fillStyle='#87CEEB';X.fillRect(-s*0.48,s*0.3,pw,ph);
  X.fillStyle='rgba(255,200,50,0.3)';X.fillRect(-s*0.48,s*0.3,pw,ph);
  X.strokeStyle='#5d4037';X.lineWidth=1;X.strokeRect(-s*0.48,s*0.3,pw,ph);

  // Pencere - sağ taraf
  X.fillStyle='#87CEEB';X.fillRect(s*0.4,s*0.3,pw,ph);
  X.fillStyle='rgba(255,200,50,0.3)';X.fillRect(s*0.4,s*0.3,pw,ph);
  X.strokeStyle='#5d4037';X.strokeRect(s*0.4,s*0.3,pw,ph);

  // Silo
  X.fillStyle='#78909c';X.fillRect(s*0.6,-s*0.35,s*0.22,s*0.9);
  X.fillStyle='#607d8b';X.fillRect(s*0.62,-s*0.33,s*0.18,s*0.86);
  // Silo dikey çizgileri
  X.strokeStyle='rgba(0,0,0,0.1)';X.lineWidth=0.5;
  for(let i=0;i<4;i++){X.beginPath();X.moveTo(s*0.62+i*s*0.05,s*0.55);X.lineTo(s*0.62+i*s*0.05,-s*0.33);X.stroke()}
  // Silo kubbe
  X.fillStyle='#B03800';X.beginPath();X.arc(s*0.71,-s*0.35,s*0.14,0,Math.PI*2);X.fill();
  X.fillStyle='#8B2500';X.beginPath();X.arc(s*0.71,-s*0.37,s*0.1,0,Math.PI*2);X.fill();
  // Silo halka
  X.strokeStyle='rgba(0,0,0,0.15)';X.lineWidth=1.5;
  X.beginPath();X.ellipse(s*0.71,-s*0.15,s*0.14,0.04,0,0,Math.PI*2);X.stroke();
  X.beginPath();X.ellipse(s*0.71,s*0.15,s*0.14,0.04,0,0,Math.PI*2);X.stroke();

  X.restore();
}

function drawCropSprite(x,y,s,type,g,cr){
  X.save();X.translate(x,y);
  if(type==='DOMATES'){
    X.fillStyle='#558b2f';X.fillRect(-1,0,2,s*0.3);
    X.fillStyle='#43a047';X.beginPath();X.ellipse(-3,s*0.05,3,1.5,-.3,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(3,s*0.08,3,1.5,.3,0,Math.PI*2);X.fill();
    if(g>0.3){let n=Math.floor(g*4)+1;
      for(let i=0;i<n;i++){let mx=Math.cos(i*2)*s*0.15;let my=-s*0.05+Math.sin(i*1.7)*s*0.1;
        X.fillStyle=cr.col[i%2];X.beginPath();X.arc(mx,my,s*0.06,0,Math.PI*2);X.fill();
        X.fillStyle='rgba(255,255,255,0.3)';X.beginPath();X.arc(mx-1,my-1,1.5,0,Math.PI*2);X.fill()}}
  }else if(type==='PATATES'){
    X.fillStyle='#795548';X.beginPath();X.ellipse(0,s*0.1,s*0.25,s*0.12,0,0,Math.PI*2);X.fill();
    X.fillStyle='#4caf50';X.beginPath();X.ellipse(-2,-s*0.08,2.5,4,-.15,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(2,-s*0.06,2.5,4,.15,0,Math.PI*2);X.fill();
    if(g>0.3){let n=Math.floor(g*3)+1;
      for(let i=0;i<n;i++){let px=Math.cos(i*2)*s*0.12;let py=s*0.1+Math.sin(i*1.5)*s*0.05;
        X.fillStyle=cr.col[i%2];X.beginPath();X.ellipse(px,py,s*0.07,s*0.05,0,0,Math.PI*2);X.fill()}}
  }else if(type==='SALATALIK'){
    X.fillStyle='#558b2f';X.fillRect(-1,-s*0.05,2,s*0.3);
    X.fillStyle='#43a047';
    X.beginPath();X.ellipse(-4,s*0.02,4,2,-.25,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(4,s*0.04,4,2,.25,0,Math.PI*2);X.fill();
    if(g>0.4){let sh=s*0.12+g*s*0.08;
      X.fillStyle='#2e7d32';X.beginPath();X.ellipse(s*0.1,-s*0.1,s*0.05,sh,0.3,0,Math.PI*2);X.fill();
      X.fillStyle='#43a047';X.beginPath();X.ellipse(s*0.08,-s*0.12,s*0.03,sh*0.6,0.3,0,Math.PI*2);X.fill()}
  }else if(type==='MARUL'){
    let l=Math.floor(g*3)+1;
    for(let i=l;i>=0;i--){
      let lr=s*0.08+i*s*0.04;
      X.fillStyle=i%2?cr.col[0]:cr.col[1];
      X.beginPath();X.ellipse(0,-i*s*0.04,lr,lr*0.5,0,0,Math.PI*2);X.fill();
    }
  }else if(type==='BIBER'){
    X.fillStyle='#558b2f';X.fillRect(-1,0,2,s*0.3);
    X.fillStyle='#43a047';X.beginPath();X.ellipse(-2,s*0.05,2.5,1.5,-.2,0,Math.PI*2);X.fill();
    if(g>0.3){let n=Math.floor(g*3)+1;
      for(let i=0;i<n;i++){let mx=Math.cos(i*2.1)*s*0.12;let my=-s*0.02+Math.sin(i*1.8)*s*0.08;
        X.fillStyle=cr.col[i%2];X.beginPath();X.ellipse(mx,my,s*0.04,s*0.06,0.2*i,0,Math.PI*2);X.fill()}}

function drawWell(x,y,s){

  X.beginPath();X.ellipse(0,s*0.35,s*0.5,s*0.1,0,0,Math.PI*2);X.fill();

  X.fillStyle='#6d4c41';
  X.beginPath();X.ellipse(0,s*0.3,s*0.48,s*0.08,0,0,Math.PI*2);X.fill();

  }

  // Taş duvar - yuvarlak kuyu gövdesi
  let stoneColors=['#9e9e9e','#b0b0b0','#888','#a5a5a5','#90a4ae'];
  for(let row=0;row<4;row++){
    let ry=s*0.22-row*s*0.06;
    let rw=s*(0.38-row*0.02);
    for(let col=0;col<8;col++){
      let tx=-rw+col*(rw*2/8)+(row%2)*rw/8;
      X.fillStyle=stoneColors[(row+col)%stoneColors.length];
      X.beginPath();X.roundRect(tx,ry,rw*2/8-1,s*0.055,1);X.fill();

    }
  }

  // İç su
  X.fillStyle='#29b6f6';
  X.beginPath();X.ellipse(0,s*0.12,s*0.3,s*0.08,0,0,Math.PI*2);X.fill();
  // Su parlaklığı
  let t=Date.now()/2000;
  X.fillStyle=`rgba(255,255,255,${0.15+Math.sin(t)*0.08})`;
  X.beginPath();X.ellipse(-s*0.08,s*0.1+Math.sin(t)*s*0.01,s*0.1,s*0.03,0.2,0,Math.PI*2);X.fill();

  X.fillStyle='#8d6e63';

function drawOrganicPath(points,width){
  if(points.length<2)return;
  X.fillStyle='rgba(160,120,70,0.65)';
  X.beginPath();
  let p0=points[0],p1=points[1];
  let dx=p1.x-p0.x,dy=p1.y-p0.y,len=Math.sqrt(dx*dx+dy*dy);
  let nx=-dy/len*width/2,ny=dx/len*width/2;
  X.moveTo(p0.x+nx,p0.y+ny);
  for(let i=1;i<points.length;i++){
    let pp=points[i-1],cp=points[i];
    X.lineTo(cp.x+(cp.x-pp.x>0?nx*-0.5:nx*0.5),cp.y+(cp.y-pp.y>0?ny*-0.5:ny*0.5));
  }
  for(let i=points.length-1;i>=0;i--){
    let pp=i>0?points[i-1]:points[0],cp=points[i];
    X.lineTo(cp.x-(cp.x-pp.x>0?nx*-0.5:nx*0.5),cp.y-(cp.y-pp.y>0?ny*-0.5:ny*0.5));
  }
  X.closePath();X.fill();
}

let tutorialStepDone=false;
let tutorialMinimized=false;

function toggleTutorialMinimize(){
  tutorialMinimized=!tutorialMinimized;
  let box=document.getElementById('tutorialBox');
  let minBtn=document.getElementById('tutorialMinBtn');
  if(tutorialMinimized){
    box.classList.add('minimized');
    minBtn.textContent='➕';
  }else{
    box.classList.remove('minimized');
    minBtn.textContent='➖';
  }
}

function speakTR(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  let u=new SpeechSynthesisUtterance(text);
  u.lang='tr-TR';u.rate=0.9;u.pitch=1.1;
  speechSynthesis.speak(u);
}

function openTutorial(){
  if(!S.tutorial)S.tutorial={active:true,step:0,type:'bread',completed:false};
  S.tutorial.active=true;
  if(S.tutorial.completed){S.tutorial.step=0;S.tutorial.completed=false}
  tutorialStepDone=false;tutorialMinimized=false;
  let box=document.getElementById('tutorialBox');
  if(box){box.classList.remove('minimized')}
  let minBtn=document.getElementById('tutorialMinBtn');
  if(minBtn){minBtn.textContent='➖'}
  skipCompletedSteps();
  renderTutorial();
  let st=TUTORIAL_STEPS.bread[S.tutorial.step];
  if(st)speakTR(st.speak);
}

function closeTutorial(){
  document.getElementById('tutorialOverlay').style.display='none';
  document.getElementById('tutorialStep').style.display='none';
  speechSynthesis.cancel();
}

function renderTutorial(){
  let t=TUTORIAL_STEPS.bread[S.tutorial.step];
  if(!t)return;
  document.getElementById('tutorialOverlay').style.display='flex';
  document.getElementById('tutorialTitle').textContent=t.title;
  let chainEl=document.getElementById('tutorialChain');
  chainEl.innerHTML='';
  t.chain.forEach((icon,i)=>{
    if(i>0){let arr=document.createElement('span');arr.className='tc-arrow';arr.textContent='→';chainEl.appendChild(arr)}
    let item=document.createElement('div');
    item.className='tc-item';
    if(i<S.tutorial.step)item.classList.add('done');
    else if(i===S.tutorial.step)item.classList.add('active');
    item.textContent=icon;
    chainEl.appendChild(item);
  });
  let btn=document.getElementById('tutorialBtn');
  if(S.tutorial.step===0){btn.textContent='Başla!';btn.style.display='inline-block'}
  else if(S.tutorial.step>=TUTORIAL_STEPS.bread.length-1){btn.style.display='none'}
  else if(tutorialStepDone){btn.textContent='Sonraki Adım';btn.style.display='inline-block'}
  else{btn.style.display='none'}
  let stepEl=document.getElementById('tutorialStep');
  let stepNum=document.getElementById('stepNum');
  let stepText=document.getElementById('stepText');
  let totalSteps=TUTORIAL_STEPS.bread.length-2;
  if(S.tutorial.step>0&&S.tutorial.step<TUTORIAL_STEPS.bread.length-1){
    stepEl.style.display='block';
    stepNum.textContent='Adım '+S.tutorial.step+'/'+totalSteps;
    stepText.innerHTML=t.desc;
    if(t.action){
      let actLabel='';
      if(t.action==='build_grid')actLabel='🏘 Tesislerden tarla satın al';
      else if(t.action==='plow')actLabel='🚜 Traktörü aktifle, tarlaya tıkla';
      else if(t.action==='plant_bugday')actLabel='🌱 Tarlaya tıkla, buğday ek';
      else if(t.action==='build_kuyu')actLabel='🏘 Tesislerden kuyu satın al';
      else if(t.action==='water')actLabel='💧 Kuyuya tıkla, sulama başlat';
      else if(t.action==='harvest_bugday')actLabel='🌾 Büyüyen buğdaya tıkla, hasat et';
      else if(t.action==='build_degirmen')actLabel='🏘 Tesislerden değirmen satın al';
      else if(t.action==='grind')actLabel='⚙ Değirmene tıkla, un üret';
      else if(t.action==='build_fırın')actLabel='🏘 Tesislerden fırın satın al';
      else if(t.action==='bake')actLabel='🔥 Fırına tıkla, ekmek pişir';
      if(actLabel)stepText.innerHTML+='<br><span class="step-action">'+actLabel+'</span>';
    }
  }else{stepEl.style.display='none'}
}

function isStepDone(action){
  if(action==='build_grid')return S.built.grid;
  if(action==='plow')return S.plowed.length>0;
  if(action==='plant_bugday')return S.plots.some(p=>p.crop==='BUGDAY');
  if(action==='build_kuyu')return S.built.kuyu;
  if(action==='water')return S.plots.some(p=>p.crop==='BUGDAY'&&p.w);
  if(action==='harvest_bugday')return(S.inv.BUGDAY||0)>0;
  if(action==='build_degirmen')return S.built.degirmen;
  if(action==='grind')return(S.invUN||0)>0;
  if(action==='build_fırın')return S.built.fırın;
  if(action==='bake')return(S.invEKMEK||0)>0;
  return false;
}
function skipCompletedSteps(){
  while(S.tutorial.step<TUTORIAL_STEPS.bread.length-1){
    let st=TUTORIAL_STEPS.bread[S.tutorial.step];
    if(!st)break;
    if(st.action&&isStepDone(st.action)){S.tutorial.step++;tutorialStepDone=false;continue}
    if(S.tutorial.step>0&&!st.action){S.tutorial.step++;tutorialStepDone=false;continue}
    break;
  }
}

function tutorialNext(){
  if(S.tutorial.step===0){
    S.tutorial.step=1;tutorialStepDone=false;
    skipCompletedSteps();
    renderTutorial();speakTR(TUTORIAL_STEPS.bread[S.tutorial.step].speak);
  }else if(S.tutorial.step<TUTORIAL_STEPS.bread.length-1){
    S.tutorial.step++;tutorialStepDone=false;
    skipCompletedSteps();
    renderTutorial();
    let st=TUTORIAL_STEPS.bread[S.tutorial.step];
    if(st)speakTR(st.speak);
  }
}

function checkTutorialAction(action){
  if(!S.tutorial||!S.tutorial.active)return;
  let current=TUTORIAL_STEPS.bread[S.tutorial.step];
  if(!current||current.action!==action)return;
  tutorialStepDone=true;
  toast('✅ Tamamlandı! Devam et...');
  let btn=document.getElementById('tutorialBtn');
  btn.textContent='Sonraki Adım';btn.style.display='inline-block';
  speakTR('Tamamlandı!');
}

function draw(){
  X.clearRect(0,0,W,H);
  calcLayout();
  // Pozisyon override - taşıma sonrasi
  if(S.buildingPos.grid){
    let off=S.buildingPos.grid;
    GX=off.x;GY=off.y;
  }
  frameCount++;
  drawSky();
  drawMountains();
  drawGrassBackground();

  let gridCX=GX+COLS*CL/2;
  let gridCY=GY+ROWS*CL/2;
  let gridBottom=GY+ROWS*CL;
  let gridRight=GX+COLS*CL;

  // ====== EV - sabit, taşıma yok ======
  let houseScale=ISLANDSCAPE?2.8:2.0;
  let houseS=CL*houseScale;
  let houseGap=CL*1.2;
  let houseX=Math.min(GX-houseGap, W*0.16+houseS);
  houseX=Math.max(houseS+CL*0.3, houseX);
  let houseY=sceneTop+Math.floor((GY-sceneTop)*0.05);
  drawHouse(houseX,houseY,houseS);

  // ====== GRID ETRAFINA CIT (sadece grid inşa edildiyse) ======
  if(S.built.grid){
    let fPad=CL*0.3;
    drawFenceSegment(GX-fPad,GY-fPad,gridRight+fPad,GY-fPad);
    drawFenceSegment(gridRight+fPad,GY-fPad,gridRight+fPad,gridBottom+fPad);
    drawFenceSegment(gridRight+fPad,gridBottom+fPad,GX-fPad,gridBottom+fPad);
    drawFenceSegment(GX-fPad,gridBottom+fPad,GX-fPad,GY-fPad);
  }

  // ====== AHIR - sag ust, buyuk ======
  barnS=CL*2.5;
  if(S.buildingPos.ahır){
    barnX=S.buildingPos.ahır.x;barnY=S.buildingPos.ahır.y;
  }else{
    let barnMinX=gridRight+CL*1.0;
    barnX=S.built.grid?Math.max(barnMinX,Math.min(W*0.88,gridRight+barnS+CL*0.5)):W*0.88;
    barnY=sceneTop+Math.floor((H-86)*0.02);
  }
  if(S.built.ahır){
    drawBarn(barnX,barnY,barnS);
  }else{
    drawPlaceholder(barnX,barnY,barnS*1.2,'AHİR');
  }

  // ====== KUMES - ahır formatında, sag alt ======
  kümesS=CL*2.0;
  if(S.buildingPos.kümes){
    kümesX=S.buildingPos.kümes.x;kümesY=S.buildingPos.kümes.y;
  }else{
    kümesX=barnX;
    kümesY=barnY+barnS*2.2;
  }
  if(S.built.kümes){
    drawKümes(kümesX,kümesY,kümesS);
  }else{
    drawPlaceholder(kümesX,kümesY,kümesS*1.2,'KÜMES');
  }

  // ====== KUMES ALTINA CIT ======
  let kFfX=kümesX-kümesS*0.7,kFfY=kümesY+kümesS*0.75;
  let kFfW=kümesS*1.4,kFfH=kümesS*0.6;
  if(S.built.kümes){
    drawFenceSegment(kFfX,kFfY,kFfX+kFfW,kFfY);
    drawFenceSegment(kFfX+kFfW,kFfY,kFfX+kFfW,kFfY+kFfH);
    drawFenceSegment(kFfX+kFfW,kFfY+kFfH,kFfX,kFfY+kFfH);
    drawFenceSegment(kFfX,kFfY+kFfH,kFfX,kFfY);
  }

  // ====== HAYVANLIK - ahır civarında ======
  let fYX=barnX-barnS*0.8,fYY=barnY+barnS*0.8;

  // ====== HAYVANLAR ======
  if(S.built.ahır){

  if(S.built.kümes){

  }

  // ====== KOPEK - grid'in solunda ======
  let dogX=GX-CL*0.6,dogY=gridCY;
  let tDog=Date.now()/2000;
  // Gölge
  X.fillStyle='rgba(0,0,0,0.1)';X.beginPath();X.ellipse(dogX,dogY+CL*0.1,CL*0.18,CL*0.04,0,0,Math.PI*2);X.fill();

  // Kulak - sarkan

  // ====== KUYU - grid'in altinda, biraz asagida ======
  wellS=CL*2.1;

  // ====== DEGIRMEN - evin altinda ======

  // ====== FIRIN ======

  // ====== DIP NOTLAR ======

if(S.built.grid){
  // ====== GRID CERCEVESI ======
  X.fillStyle='#5d4037';

  // ====== EKILI ALANLAR ======
  let t=Date.now();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let x=GX+c*CL,y=GY+r*CL;

          X.beginPath();X.arc(x+CL/2,y+CL/2,CL*0.4,0,Math.PI*2);X.fill();
        }
      }
      if(S.sel===r*COLS+c){X.strokeStyle='#ffe082';X.lineWidth=2;X.strokeRect(x+1,y+1,CL-2,CL-2)}
      if(p.w){X.fillStyle='rgba(100,180,255,0.7)';X.beginPath();X.arc(x+CL-5,y+5,4,0,Math.PI*2);X.fill()}
      if(p.p){X.fillStyle='rgba(255,200,50,0.7)';X.beginPath();X.arc(x+5,y+CL-5,4,0,Math.PI*2);X.fill()}
    }
  }

  // ====== SULAMA BORUSU + SPRINKLER (grid ustune cizilir) ======
  if(S.built.kuyu){
  let isIrrigating=S.irrigating;
  let pipeColor=isIrrigating?'#42a5f5':'#78909c';

  // Tek boru - kuyudan tarla merkezine
  let sprinklerX=gridCX;
  let sprinklerY=GY+ROWS*CL*0.5;
  let pipeStartYW=wellY-wellS*0.35;

  // Boru gölgesi
  X.strokeStyle='rgba(0,0,0,0.2)';X.lineWidth=6;
  X.beginPath();X.moveTo(wellX+1,pipeStartYW+1);X.lineTo(sprinklerX+1,sprinklerY+1);X.stroke();
  // Ana boru
  X.strokeStyle=pipeColor;X.lineWidth=4;
  X.beginPath();X.moveTo(wellX,pipeStartYW);X.lineTo(sprinklerX,sprinklerY);X.stroke();
  // Boru parlaklığı
  X.strokeStyle=isIrrigating?'rgba(100,181,246,0.5)':'rgba(200,210,220,0.4)';X.lineWidth=1;
  X.beginPath();X.moveTo(wellX-1,pipeStartYW-1);X.lineTo(sprinklerX-1,sprinklerY-1);X.stroke();

  // Sulama başladiginda boruda su ilerlemesi animasyonu
  if(isIrrigating){
    let t=Date.now()/500;
    let prog=(Math.sin(t)*0.5+0.5);
    let midX=wellX+(sprinklerX-wellX)*prog;
    let midY=pipeStartYW+(sprinklerY-pipeStartYW)*prog;
    X.strokeStyle='rgba(66,165,245,0.9)';X.lineWidth=2.5;
    X.beginPath();X.moveTo(wellX,pipeStartYW);X.lineTo(midX,midY);X.stroke();
  }

  // Sprinkler dikey boru + baslik
  X.strokeStyle=pipeColor;X.lineWidth=3;
  X.beginPath();X.moveTo(sprinklerX,sprinklerY);X.lineTo(sprinklerX,sprinklerY-10);X.stroke();
  X.fillStyle=isIrrigating?'#1565c0':'#455a64';
  X.beginPath();X.arc(sprinklerX,sprinklerY-11,5,0,Math.PI*2);X.fill();
  X.fillStyle=isIrrigating?'#42a5f5':'#607d8b';
  X.beginPath();X.arc(sprinklerX,sprinklerY-11,3.5,0,Math.PI*2);X.fill();
  X.strokeStyle=isIrrigating?'#90caf9':'#90a4ae';X.lineWidth=1;
  for(let a=0;a<6;a++){
    let ang=a*Math.PI/3;
    X.beginPath();
    X.moveTo(sprinklerX+Math.cos(ang)*4,sprinklerY-11+Math.sin(ang)*4);
    X.lineTo(sprinklerX+Math.cos(ang)*7,sprinklerY-11+Math.sin(ang)*7);
    X.stroke();
  }

  // Sprinkler yagmur animasyonu
  if(isIrrigating){
    let t=Date.now();
    let emitY=sprinklerY-11;
    // Yagmur damlalari - yukari cikip yagmur gibi yagiyor
    for(let i=0;i<80;i++){
      let seed=i*137.508+t*0.003;
      let angle=(seed%(Math.PI*2));
      let maxDist=CL*3.5;
      let cycleT=(t*0.002+i*0.37)%2;
      let dist=maxDist*cycleT;
      let dx=sprinklerX+Math.cos(angle)*dist;
      // Damlalar yukari cikip sonra yere dogru duser
      let risePhase=Math.min(1,cycleT*2);
      let fallPhase=Math.max(0,cycleT-0.5)*2;
      let riseH=CL*1.2*risePhase*(1-fallPhase);
      let dropY=emitY-riseH+fallPhase*fallPhase*CL*1.5;
      let alpha=0.7*(1-Math.abs(cycleT-0.7));
      if(alpha>0.05&&dropY>=GY&&dropY<=GY+ROWS*CL&&dx>=GX&&dx<=GX+COLS*CL){
        // Ince yagmur damlasi cizgisi
        X.strokeStyle=`rgba(100,181,246,${alpha})`;
        X.lineWidth=1.2;
        X.beginPath();X.moveTo(dx,dropY-3);X.lineTo(dx-0.5,dropY+3);X.stroke();
        // Damla ucu
        X.fillStyle=`rgba(100,181,246,${alpha*0.8})`;
        X.beginPath();X.arc(dx,dropY+3,1,0,Math.PI*2);X.fill();
      }
    }
    // Yere carpan damlalarin cembersel etkisi
    for(let i=0;i<20;i++){
      let seed=i*97.31+t*0.004;
      let angle=(seed%(Math.PI*2));
      let ringDist=CL*0.8+((seed*3)%CL*2);
      let rdx=sprinklerX+Math.cos(angle)*ringDist;
      let rdy=sprinklerY+CL*0.3+Math.sin(angle*0.5)*CL*0.3;
      if(rdy>=GY&&rdy<=GY+ROWS*CL&&rdx>=GX&&rdx<=GX+COLS*CL){
        let ringPhase=(t*0.005+i*0.5)%1.5;
        if(ringPhase<1){

          X.beginPath();X.ellipse(rdx,rdy+CL*0.1,ringR,ringR*0.3,0,0,Math.PI*2);X.stroke();
        }
      }
    }
    // Sprinkler etrafindaki su halesi
    let haloR=CL*2+Math.sin(t*0.001)*CL*0.2;
    let haloGrad=X.createRadialGradient(sprinklerX,emitY,0,sprinklerX,emitY,haloR);

    X.fillStyle=haloGrad;
    X.beginPath();X.arc(sprinklerX,emitY,haloR,0,Math.PI*2);X.fill();
  }
  }

} // end if(S.built.grid)

  // ====== TRAKTOR ======
  if(S.tractorActive){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){X.fillStyle='rgba(255,255,255,0.05)';X.fillRect(GX+c*CL,GY+r*CL,CL-1,CL-1)}

  }

  // ====== SOKAK LAMBALARI ======
  let dl=getDaylight();
  let isNight=dl<0.4;
  let gridCY2=GY+ROWS*CL/2;
  let gridBottom2=GY+ROWS*CL;
  let gridCX2=GX+COLS*CL/2;
  lampPositions=[
    {x:houseX-houseS*0.9,y:houseY+houseS*0.8,tip:'guzel'},
    {x:houseX+houseS*0.9,y:houseY+houseS*0.8,tip:'guzel'},
    {x:GX-CL*0.6,y:GY-CL*0.3,tip:'basit'},
    {x:GX+COLS*CL+CL*0.6,y:GY-CL*0.3,tip:'basit'},
    {x:GX-CL*0.6,y:GY+ROWS*CL*0.5,tip:'basit'},
    {x:GX+COLS*CL+CL*0.6,y:GY+ROWS*CL*0.5,tip:'basit'},
    {x:GX-CL*0.6,y:gridBottom2+CL*0.3,tip:'basit'},
    {x:GX+COLS*CL+CL*0.6,y:gridBottom2+CL*0.3,tip:'basit'},
    {x:barnX-barnS*0.5,y:barnY+barnS*0.7,tip:'guzel'},
    {x:kümesX-kümesS*0.5,y:kümesY+kümesS*0.7,tip:'guzel'}
  ];
  lampPositions.forEach(lp=>{
    let poleH=lp.tip==='basit'?CL*0.8:CL*1.1;
    let baseY=lp.y;
    let topY=baseY-poleH;
    let cx=lp.x;
    // Gölge
    X.fillStyle='rgba(0,0,0,0.15)';X.beginPath();X.ellipse(cx,baseY+2,lp.tip==='basit'?5:8,2,0,0,Math.PI*2);X.fill();
    if(lp.tip==='basit'){
      // BASIT LAMBA - tek fener, duz direk
      X.fillStyle='#607d8b';X.fillRect(cx-1.5,baseY-poleH,3,poleH);
      X.fillStyle='#455a64';X.fillRect(cx-3,baseY-2,6,4);

      X.fillStyle='#37474f';
      X.beginPath();X.moveTo(cx-4,topY+2);X.lineTo(cx+4,topY+2);
      X.lineTo(cx+3,topY-5);X.lineTo(cx-3,topY-5);X.closePath();X.fill();
      X.fillStyle='rgba(200,220,240,0.4)';X.fillRect(cx-2,topY-3,4,4);

      let fenerler=[{x:cx-CL*0.22,y:topY+18},{x:cx,y:topY},{x:cx+CL*0.22,y:topY+18}];
      fenerler.forEach(f=>{
        X.fillStyle='#37474f';
        X.beginPath();X.moveTo(f.x-5,f.y+2);X.lineTo(f.x+5,f.y+2);X.lineTo(f.x+4,f.y-8);X.lineTo(f.x-4,f.y-8);X.closePath();X.fill();
        X.fillStyle=isNight?'rgba(255,230,130,0.7)':'rgba(180,200,220,0.5)';
        X.fillRect(f.x-3,f.y-6,6,7);
        X.fillStyle='#263238';X.beginPath();X.moveTo(f.x-6,f.y+2);X.lineTo(f.x+6,f.y+2);X.lineTo(f.x+4,f.y+4);X.lineTo(f.x-4,f.y+4);X.closePath();X.fill();
        X.fillStyle='#37474f';X.beginPath();X.moveTo(f.x-5,f.y-8);X.lineTo(f.x+5,f.y-8);X.lineTo(f.x+2,f.y-12);X.lineTo(f.x-2,f.y-12);X.closePath();X.fill();
        X.beginPath();X.arc(f.x,f.y-12,2,0,Math.PI*2);X.fill();
      });

        fenerler.forEach(f=>{
          let glowR=CL*0.7;
          let grd=X.createRadialGradient(f.x,f.y-2,0,f.x,f.y-2,glowR);
          grd.addColorStop(0,'rgba(255,220,100,0.35)');grd.addColorStop(0.3,'rgba(255,200,80,0.15)');
          grd.addColorStop(0.7,'rgba(255,180,50,0.03)');grd.addColorStop(1,'rgba(255,180,50,0)');
          X.fillStyle=grd;X.beginPath();X.arc(f.x,f.y-2,glowR,0,Math.PI*2);X.fill();
          X.fillStyle='rgba(255,230,120,0.95)';X.beginPath();X.arc(f.x,f.y-2,2.5,0,Math.PI*2);X.fill();
        });
      }
    }
  });

  // ====== YARDIMCI YAZI ======
  X.fillStyle='rgba(0,0,0,0.4)';
  X.fillRect(8,H-42,W-16,36);X.strokeStyle='#c8956c';X.lineWidth=1;X.strokeRect(8,H-42,W-16,36);

  X.fillText('EV: Dinlen | MAGAZA: Alışveriş | HAYVAN: Bakım | DEPO: Ürünler | Traktör: Sur',16,H-22);

  // ====== SURUKLEME ONIZLEME ======
  if(S.dragging){
    let dx=S.dragX,dy=S.dragY;
    let valid=isValidPlacement(S.dragging,dx,dy);
    X.globalAlpha=0.5;
    if(S.dragging==='grid'){
      X.fillStyle=valid?'rgba(100,200,100,0.3)':'rgba(200,100,100,0.3)';
      X.fillRect(dx,dy,COLS*CL,ROWS*CL);
      X.strokeStyle=valid?'#4caf50':'#e53935';X.lineWidth=3;
      X.strokeRect(dx,dy,COLS*CL,ROWS*CL);
    }else if(S.dragging==='ahır'){
      drawBarn(dx,dy,CL*2.5);
    }else if(S.dragging==='kümes'){
      drawKümes(dx,dy,CL*2.0);
    }else if(S.dragging==='degirmen'){
      drawWindmill(dx,dy,CL*(ISLANDSCAPE?2.8:2.0)*0.8);
    }else if(S.dragging==='kuyu'){
      drawWell(dx,dy,CL*2.1);
    }else if(S.dragging==='fırın'){
      drawFırın(dx,dy,CL*(ISLANDSCAPE?2.0:1.6));
    }
    X.globalAlpha=1;
  }

  // ====== BINA MENU ======
  drawBuildingMenu();

  // ====== MOD INDICATORS ======
  if(plantMode){
    let cr=CROPS[plantMode];
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(W/2-160,48,320,32);X.strokeStyle='#ff9800';X.lineWidth=2;X.strokeRect(W/2-160,48,320,32);

    X.fillText('🌱 Ekim Modu: '+cr.name+' — Tarlalara tıkla, çıkmak için boş yere tıkla',W/2,64);X.textAlign='left';
  }
  if(harvestModeActive){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(W/2-160,48,320,32);X.strokeStyle='#4caf50';X.lineWidth=2;X.strokeRect(W/2-160,48,320,32);
    X.fillStyle='#4caf50';X.font='bold 14px Nunito,sans-serif';X.textAlign='center';X.textBaseline='middle';
    X.fillText('🌾 Hasat Modu — Hazır tarlalara tıkla, çıkmak için boş yere tıkla',W/2,64);X.textAlign='left';
  }
}

function advanceTime(){S.m+=10;while(S.m>=60){S.m-=60;S.h++}if(S.h>=22){newDay();return}
  if(S.irrigating){
    if(S.h>S.irrigEndH||(S.h===S.irrigEndH&&S.m>=S.irrigEndM)){
      S.irrigating=false;
      let elapsedMin=(S.h-S.irrigStartH)*60+(S.m-S.irrigStartM);
      if(elapsedMin>=40){
        S.plots.forEach(p=>{p.w=true});
        toast('Sulama tamamlandı! Tarla sulandı. ('+elapsedMin+' dk)');
      }else{
        toast('Sulama süreyi tamamlamadı! ('+elapsedMin+' dk < 40 dk) Sulanmadı.');
      }
    }
  }
  Object.keys(S.lastHarvestTime).forEach(k=>{if(S.lastHarvestTime[k]>0)S.lastHarvestTime[k]--});
  S.plots.forEach(p=>{if(p.crop&&p.nextHarvest>0)p.nextHarvest=Math.max(0,p.nextHarvest-10)});
  checkWhole();updateHUD();checkMissions();
  let plotModal=document.getElementById('mPlot');
  if(plotModal&&plotModal.classList.contains('active')&&selR>=0){
    let sp=getP(selR,selC);
    if(sp&&sp.crop)openPlotM(selR,selC);
  }}

function changeWeather(){
  let weights;
  if(S.sea===0)weights=[0.35,0.3,0.25,0.1];
  else if(S.sea===1)weights=[0.5,0.2,0.2,0.1];
  else if(S.sea===2)weights=[0.2,0.35,0.3,0.15];
  else weights=[0.1,0.25,0.2,0.45];
  let r=Math.random(),cum=0;
  for(let i=0;i<WEATHERS.length;i++){cum+=weights[i];if(r<cum){S.weather=WEATHERS[i];break}}
  rainDrops=[];snowFlakes=[];
  if(S.weather==='yağmurlu')for(let i=0;i<150;i++)rainDrops.push({x:Math.random()*W,y:Math.random()*H,spd:4+Math.random()*4});
  if(S.weather==='karlı')for(let i=0;i<80;i++)snowFlakes.push({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*2,spd:1+Math.random()*2});
  if(S.weather==='güneşli')S.windSpeed=3+Math.floor(Math.random()*5);
  else if(S.weather==='bulutlu')S.windSpeed=5+Math.floor(Math.random()*8);
  else if(S.weather==='yağmurlu')S.windSpeed=8+Math.floor(Math.random()*12);
  else S.windSpeed=2+Math.floor(Math.random()*4);
}
changeWeather();

function newDay(){
  S.h=6;S.m=0;S.day++;if(S.day>90){S.day=1;S.sea=(S.sea+1)%4;if(S.sea===0)S.yr++}
  harvest();feedAnimals();genWhole();S.whArr=false;S.whDis=false;
  Object.keys(S.dailyHarvest).forEach(k=>S.dailyHarvest[k]=0);
  S.dailyAnimal.YUMURTA=0;S.dailyAnimal.SUT=0;S.dailySold=0;
  S.plantCount=0;S.waterCount=0;
  sutCount=0;yumurtaCount=0;
  changeWeather();
  document.getElementById('infoPanel').textContent=FACTS[Math.floor(Math.random()*FACTS.length)];
  document.getElementById('infoPanel').style.opacity='1';setTimeout(()=>{document.getElementById('infoPanel').style.opacity='0'},20000);
  generateMissions();updateHUD();renderMissions();
}

function harvest(){
  let ib=Math.min(.2,S.st.SULAMA*.04),pb=Math.min(.2,S.st.ICLAMA*.04);
  let cap=500+S.st.DEPO*200,used=Object.values(S.inv).reduce((a,b)=>a+b,0);
  S.plots.forEach(p=>{if(!p.crop||p.nextHarvest>0)return;let cr=CROPS[p.crop];if(!cr)return;
    let age=p.age/365,g=Math.min(1,age/cr.my);let y=cr.mk*g*cr.sea[S.sea];
  y/=3;if(p.w)y*=(1+ib);if(p.p)y*=(1+pb);
    if(y>0&&(used+y)<=cap){S.inv[p.crop]=(S.inv[p.crop]||0)+y;S.dailyHarvest[p.crop]=(S.dailyHarvest[p.crop]||0)+y;used+=y}
    p.age++;p.w=false;p.p=false;p.nextHarvest=p.crop==='BUGDAY'?120:480;
  });
}

function feedAnimals(){
  S.money-=(S.ch*ANIM.TAVUK.feed+S.co*ANIM.INEK.feed+S.sh*ANIM.KOYUN.feed);
  if(S.day%ANIM.TAVUK.int===0&&S.ch>0){let a=S.ch*ANIM.TAVUK.adet;S.inv.YUMURTA=(S.inv.YUMURTA||0)+a;S.dailyAnimal.YUMURTA=(S.dailyAnimal.YUMURTA||0)+a}
  if(S.day%ANIM.INEK.int===0&&S.co>0){let a=S.co*ANIM.INEK.litre;S.inv.SUT=(S.inv.SUT||0)+a;S.dailyAnimal.SUT=(S.dailyAnimal.SUT||0)+a}
  if(S.day%ANIM.KOYUN.int===0&&S.sh>0){let a=S.sh*ANIM.KOYUN.adet;S.inv.YUN=(S.inv.YUN||0)+a;S.dailyAnimal.YUN=(S.dailyAnimal.YUN||0)+a}
}

setInterval(()=>{S.m++;while(S.m>=60){S.m-=60;S.h++}if(S.h>=22)newDay();
  Object.keys(S.lastHarvestTime).forEach(k=>{if(S.lastHarvestTime[k]>0)S.lastHarvestTime[k]--});
  S.plots.forEach(p=>{if(p.crop&&p.nextHarvest>0)p.nextHarvest--});
  checkWhole();updateHUD()},2000);

function generateMissions(){S.missions=[];S.missionProgress={};let shuffled=[...MISSION_TEMPLATES].sort(()=>Math.random()-0.5);
  for(let i=0;i<3&&i<shuffled.length;i++){let m=shuffled[i];S.missions.push({...m});S.missionProgress[i]=0}}
function checkMissions(){S.missions.forEach((m,i)=>{if(S.missionProgress[i]>=m.target)return;
  if(m.type==='harvest'){S.missionProgress[i]=S.dailyHarvest[m.crop]||0}
  else if(m.type==='animal'){S.missionProgress[i]=S.dailyAnimal[m.animal]||0}
  else if(m.type==='sell'){S.missionProgress[i]=S.dailySold}
  else if(m.type==='plant'){S.missionProgress[i]=S.plantCount}
  else if(m.type==='water'){S.missionProgress[i]=S.waterCount}});renderMissions()}
function renderMissions(){let l=document.getElementById('missionList');l.innerHTML='';
  S.missions.forEach((m,i)=>{let prog=Math.min(S.missionProgress[i]||0,m.target);let done=prog>=m.target;
    let d=document.createElement('div');d.className='mi'+(done?' done':'');
    d.innerHTML=`<span class="check"></span>${m.text} (${prog}/${m.target})`;
    if(done&&!m.rewarded){S.money+=100;m.rewarded=true;toast('Görev tamamlandı! +100 TL')}l.appendChild(d)})}
function openTesisler(){
  let grid=document.getElementById('tesisGrid');grid.innerHTML='';

  let tesisler=[
    {name:'Ev',fn:drawHouseToCanvas,bg:'#8d6e63',free:true},

    {name:'Kuyu',fn:drawWellToCanvas,bg:'#29b6f6'},

  tesisler.forEach(t=>{

      let key=tesisKey[t.name];
      let built=S.built[key];
      let info=document.createElement('div');info.style.cssText='font-size:10px;margin-top:3px;';
      if(built){info.style.color='#81c784';info.textContent='İnşa Edildi'}
      else{info.style.color='#ef9a9a';info.textContent=tesisFiyat[t.name]+' TL'}
      d.appendChild(info);
      if(!built){
        let btn=document.createElement('button');btn.style.cssText='background:#5a8c3a;color:#fff;border:1px solid #8bc34a;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:bold;margin-top:4px';
        btn.textContent='Satın al '+tesisFiyat[t.name]+' TL';
        btn.onclick=function(e){e.stopPropagation();buyBuilding(key,tesisFiyat[t.name],t.name);openTesisler()};
        d.appendChild(btn);
      }else{
        let moveBtn=document.createElement('button');moveBtn.style.cssText='background:#5d4037;color:#ffe082;border:1px solid #c8956c;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:bold;margin-top:4px';
        moveBtn.textContent='📍 Taşıma Modu';
        moveBtn.onclick=function(e){e.stopPropagation();closeM('tesisler');startDrag(key)};
        d.appendChild(moveBtn);
      }
    }
    grid.appendChild(d);
  });
  document.getElementById('mTesisler').classList.add('active');
}

function drawMiniCrop(c,type,s){

  let c1=cols.col[0],c2=cols.col[1];
  if(type==='DOMATES'){
    c.fillStyle='#4caf50';c.fillRect(-1,-s*0.35,2,s*0.25);
    c.fillStyle=c2;c.beginPath();c.arc(0,0,s*0.28,0,Math.PI*2);c.fill();
    c.fillStyle=c1;c.beginPath();c.arc(0,0,s*0.2,0,Math.PI*2);c.fill();
    c.fillStyle='#4caf50';c.fillRect(-s*0.08,-s*0.3,s*0.16,s*0.08);
  }else if(type==='PATATES'){
    c.fillStyle=c1;c.beginPath();c.ellipse(0,0,s*0.3,s*0.2,0,0,Math.PI*2);c.fill();
    c.fillStyle=c2;c.beginPath();c.ellipse(s*0.05,-s*0.05,s*0.12,s*0.08,.3,0,Math.PI*2);c.fill();
  }else if(type==='SALATALIK'){
    c.fillStyle=c2;c.beginPath();c.ellipse(0,0,s*0.12,s*0.3,0,0,Math.PI*2);c.fill();
    c.fillStyle=c1;c.beginPath();c.ellipse(-s*0.02,s*0.05,s*0.08,s*0.2,0,0,Math.PI*2);c.fill();
  }else if(type==='MARUL'){
    c.fillStyle=c2;c.beginPath();c.arc(0,0,s*0.28,0,Math.PI*2);c.fill();
    c.fillStyle=c1;c.beginPath();c.arc(0,-s*0.05,s*0.2,0,Math.PI*2);c.fill();
    c.fillStyle='#81c784';c.beginPath();c.arc(0,0,s*0.12,0,Math.PI*2);c.fill();

    c.fillStyle='#4caf50';c.fillRect(-1,-s*0.35,2,s*0.2);
    c.fillStyle=c2;c.beginPath();c.moveTo(0,-s*0.15);c.quadraticCurveTo(s*0.2,0,0,s*0.3);c.quadraticCurveTo(-s*0.2,0,0,-s*0.15);c.fill();
    c.fillStyle=c1;c.beginPath();c.moveTo(0,-s*0.1);c.quadraticCurveTo(s*0.12,0,0,s*0.2);c.quadraticCurveTo(-s*0.12,0,0,-s*0.1);c.fill();
  }else if(type==='PATLICAN'){
    c.fillStyle=c2;c.beginPath();c.ellipse(0,0,s*0.15,s*0.3,0,0,Math.PI*2);c.fill();

    c.fillStyle='#4caf50';c.fillRect(-s*0.06,-s*0.35,s*0.12,s*0.08);

    c.fillStyle=c1;c.beginPath();c.ellipse(0,0,s*0.12,s*0.3,0,0,Math.PI*2);c.fill();
    c.fillStyle=c2;for(let i=0;i<5;i++){c.beginPath();c.arc(0,-s*0.15+i*s*0.08,s*0.04,0,Math.PI*2);c.fill()}
    c.fillStyle='#4caf50';c.fillRect(-s*0.15,-s*0.35,s*0.3,s*0.1);
  }else if(type==='KABAK'){
    c.fillStyle=c2;c.beginPath();c.arc(0,s*0.05,s*0.25,0,Math.PI*2);c.fill();
    c.fillStyle=c1;c.beginPath();c.arc(0,s*0.05,s*0.18,0,Math.PI*2);c.fill();
    c.fillStyle='#4caf50';c.fillRect(-1,-s*0.3,2,s*0.15);
  }else if(type==='SOGAN'){
    c.fillStyle=c1;c.beginPath();c.arc(0,s*0.05,s*0.22,0,Math.PI*2);c.fill();
    c.fillStyle=c2;c.beginPath();c.arc(0,s*0.02,s*0.16,0,Math.PI*2);c.fill();

}

let lastPlantClick=-1;
let selR=-1,selC=-1;
let plantMode=null;
let harvestModeActive=false;
CV.addEventListener('click',e=>{
  if(S.dragging||S.buildingMenu)return;
  let mx=e.clientX,my=e.clientY;
  let gx=mx-GX,gy=my-GY;
  let c=Math.floor(gx/CL),r=Math.floor(gy/CL);

  // Ahıra tıklama - süt sağma (günlük 2 kez)
  if(typeof barnX!=='undefined'){
    let bDx=mx-barnX,bDy=my-barnY;
    if(Math.abs(bDx)<barnS*0.6&&Math.abs(bDy)<barnS*0.6){
      if(!S.built.ahır){toast('Önce ahır inşa et!');return}
      if(S.co>0){
        if(sutCount>=2){toast('Bugün zaten 2 kez süt sağıldı! Yarın tekrar dene.');return}
        let sut=Math.min(S.co,3)*2;
        S.inv.SUT=(S.inv.SUT||0)+sut;
        sutCount++;
        toast(`${sut} lt Süt sağıldı! (${sutCount}/2) Toplam: ${(S.inv.SUT||0)} lt`);
        advanceTime();draw();return
      }else{toast('Ahırda inek yok!');return}
    }
  }
  // Kümüse tıklama - yumurta toplama (günlük 1 kez)
  if(typeof kümesX!=='undefined'){
    let kDx=mx-kümesX,kDy=my-kümesY;
    if(Math.abs(kDx)<kümesS*0.6&&Math.abs(kDy)<kümesS*0.6){
      if(!S.built.kümes){toast('Önce kümes inşa et!');return}
      if(S.ch>0){
        if(yumurtaCount>=1){toast('Bugün zaten yumurta toplandı! Yarın tekrar dene.');return}
        let yumurta=Math.min(S.ch,6);
        S.inv.YUMURTA=(S.inv.YUMURTA||0)+yumurta;
        yumurtaCount++;
        toast(`${yumurta} Yumurta toplandı! (${yumurtaCount}/1) Toplam: ${(S.inv.YUMURTA||0)} adet`);
        advanceTime();draw();return
      }else{toast('Kümeste tavuk yok!');return}
    }
  }
  // Kuyuya tıklama - sulama başlat/durdur
  if(typeof wellX!=='undefined'){
    let wDx=mx-wellX,wDy=my-wellY;
    if(Math.abs(wDx)<wellS*0.6&&Math.abs(wDy)<wellS*0.6){
      if(!S.built.kuyu){toast('Önce kuyu inşa et!');return}
      if(S.irrigating){
        // Sulamayı durdur
        let elapsedMin=(S.h-S.irrigStartH)*60+(S.m-S.irrigStartM);
        if(elapsedMin<40){
          S.irrigating=false;
          S.plots.forEach(p=>{p.w=false});
          toast('Sulama iptal edildi! 40 dk altında kaldığı için sulanmadı.');
        }else{
          S.irrigating=false;
          S.plots.forEach(p=>{p.w=true});
          toast('Sulama durduruldu! Tarla sulandı. ('+elapsedMin+' dk)');
        }
        advanceTime();draw();return
      }else{
        // Sulamayi başlat
        S.irrigating=true;
        S.irrigStartH=S.h;S.irrigStartM=S.m;
        S.irrigEndH=S.h+1;S.irrigEndM=S.m;
        if(S.irrigEndH>=22){S.irrigEndH=21;S.irrigEndM=50}
        toast('Sulama başlatildi! Tekrar tıklayarak durdurabilirsin.');
        advanceTime();draw();return
      }
    }
  }

  // Değirmene tıklama - buğday öğüt
  if(typeof wmX!=='undefined'){
    let dDx=mx-wmX,dDy=my-wmY;
    if(S.built.degirmen&&Math.abs(dDx)<wmS*0.6&&Math.abs(dDy)<wmS*0.6){
      let bugday=S.inv.BUGDAY||0;
      if(bugday<3){toast('Değirmen için en az 3 buğday gerekli! (Mevcut: '+bugday+')');return}
      S.inv.BUGDAY-=3;S.invUN=(S.invUN||0)+1;
      toast('3 Buğday → 1 Un! (Toplam un: '+S.invUN+')');
      checkTutorialAction('grind');advanceTime();draw();return
    }
  }
  // Fırına tıklama - un pişir
  if(typeof firinX!=='undefined'){
    let fDx=mx-firinX,fDy=my-firinY;
    if(S.built.fırın&&Math.abs(fDx)<firinS*0.6&&Math.abs(fDy)<firinS*0.6){
      let un=S.invUN||0;
      if(un<1){toast('Fırın için en az 1 un gerekli! (Mevcut: '+un+')');return}
      S.invUN-=1;S.invEKMEK=(S.invEKMEK||0)+1;
      toast('1 Un → 1 Ekmek pişirildi! (Toplam ekmek: '+S.invEKMEK+')');
      checkTutorialAction('bake');advanceTime();draw();return
    }
  }

  if(!S.built.grid){if(!S.buildingMenu)toast('Önce tarla inşa et! (Tesislerden)');return}
  if(S.tractorActive&&r>=0&&r<ROWS&&c>=0&&c<COLS){plowArea(r,c);S.tractorActive=false;checkTutorialAction('plow');draw();return}

  if(plantMode){
    if(r<0||r>=ROWS||c<0||c>=COLS){plantMode=null;toast('Ekim modu kapatıldı.');draw();return}
    let p=getP(r,c);
    if(!p||p.crop){toast('Bu hücrede zaten ekin var!');return}
    if(!S.plowed.includes(r*COLS+c)){toast('Önce traktörle sür!');return}
    let cr=CROPS[plantMode];
    if(!cr){plantMode=null;return}
    if(S.money<cr.buy){toast('Yeterli paran yok! ('+cr.buy+' TL)');return}
    S.money-=cr.buy;p.crop=plantMode;p.age=0;p.w=false;p.p=false;p.nextHarvest=plantMode==='BUGDAY'?120:480;p.harvestCount=0;S.plantCount++;
    toast(`${cr.name} ekildi! (+${cr.buy} TL)`);if(plantMode==='BUGDAY')checkTutorialAction('plant_bugday');
    draw();return;
  }

  if(harvestModeActive){
    if(r<0||r>=ROWS||c<0||c>=COLS){harvestModeActive=false;toast('Hasat modu kapatıldı.');draw();return}
    let p=getP(r,c);
    if(!p||!p.crop){toast('Burada ekin yok!');return}
    if(p.nextHarvest>0){let hrs=Math.floor(p.nextHarvest/60);let mins=p.nextHarvest%60;toast(`Henüz hazır değil! (${hrs}sa ${mins}dk)`);return}
    let cr=CROPS[p.crop];if(!cr)return;
    let ib=p.w?Math.min(.2,S.st.SULAMA*.04):0,pb=p.p?Math.min(.2,S.st.ICLAMA*.04):0;
    let g=Math.min(1,(p.age/365)/cr.my);let y=cr.mk*g*cr.sea[S.sea];
    if(p.w)y*=(1+ib);if(p.p)y*=(1+pb);
    y=Math.max(0.1,y);
    let cap=500+S.st.DEPO*200,used=Object.values(S.inv).reduce((a,b)=>a+b,0);
    if((used+y)<=cap){
      S.inv[p.crop]=(S.inv[p.crop]||0)+y;S.dailyHarvest[p.crop]=(S.dailyHarvest[p.crop]||0)+y;
      p.harvestCount=(p.harvestCount||0)+1;let mh=cr.maxHarvest||1;
      if(p.harvestCount>=mh){let cn=cr.name;p.crop=null;p.age=0;p.w=false;p.p=false;p.nextHarvest=0;p.harvestCount=0;toast(`${cn} bitkiniz tükendi! Yeni tohum ek.`)}
      else{p.age+=5;p.w=false;p.p=false;p.nextHarvest=p.crop==='BUGDAY'?120:480;toast(`${cr.name} hasat edildi! +${y.toFixed(1)} kg (Kalan: ${mh-p.harvestCount})`)}
      if(p.crop&&p.crop==='BUGDAY')checkTutorialAction('harvest_bugday');
    }else{toast('Depo dolu!')}
    draw();return;
  }

  if(r<0||r>=ROWS||c<0||c>=COLS){closeAllModals();lastPlantClick=-1;S.sel=-1;selR=-1;selC=-1;draw();return}
  S.sel=r*COLS+c;let p=getP(r,c);
  if(!p.crop){
    if(!S.plowed.includes(r*COLS+c)){toast('Önce traktörle sür!');return}
    let idx=r*COLS+c;
    if(lastPlantClick===idx&&document.getElementById('mPlant').classList.contains('active')){closeM('plant');lastPlantClick=-1;draw();return}
    lastPlantClick=idx;openPlantM(r,c);
  }else{lastPlantClick=-1;selR=r;selC=c;openPlotM(r,c)}draw();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAllModals();S.tractorActive=false;lastPlantClick=-1;S.sel=-1;selR=-1;selC=-1;plantMode=null;harvestModeActive=false;draw()}});
function closeAllModals(){['plant','plot','shop','animal','storage','whole','tesisler'].forEach(m=>closeM(m))}
function getP(r,c){return S.plots.find(p=>p.r===r&&p.c===c)}

function openPlantM(r,c){let l=document.getElementById('plantList');l.innerHTML='';let isWinter=S.sea===3;
  let tip=document.createElement('div');tip.style.cssText='color:#ffe082;font-size:11px;margin-bottom:6px;padding:4px 8px;background:rgba(0,0,0,0.3);border-radius:4px';
  tip.textContent='Tohum seç → tarlalara tıkla → boş yere tıkla = bitir';l.appendChild(tip);
  Object.entries(CROPS).forEach(([k,cr])=>{let ok=!isWinter;
    let d=document.createElement('div');d.className='item';
    let harvestInfo='3\'te 1 gün';let winterNote=isWinter?' (Kışın ekilmez)':'';
    d.innerHTML=`<div class="inf"><div class="nm">${cr.name}${winterNote}</div><div class="dt">Sebze | Max:${cr.mk}kg | Hasat: ${harvestInfo}</div></div><div class="pr">${cr.buy} TL</div>`;
    if(!ok){d.style.opacity='.3';d.style.cursor='not-allowed'}
    else d.onclick=()=>{if(S.money<cr.buy){toast('Yeterli paran yok!');return}plantMode=k;closeM('plant');lastPlantClick=-1;toast(`${cr.name} ekim modu! Tarlalara tıkla. Çıkmak için boş yere tıkla.`);draw()};
    l.appendChild(d)});openM('plant')}

function openPlotM(r,c){let p=getP(r,c),cr=CROPS[p.crop];if(!cr)return;
  let age=(p.age/365).toFixed(1),ib=p.w?Math.min(.2,S.st.SULAMA*.04):0,pb=p.p?Math.min(.2,S.st.ICLAMA*.04):0;
  let g=Math.min(1,(p.age/365)/cr.my),y=cr.mk*g*cr.sea[S.sea]*(1+ib)*(1+pb);y=Math.max(0.1,y);let ys=y.toFixed(1);
  let harvestText='';let canHarvest=p.nextHarvest<=0;
