<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Çiftlik Simülasyonu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* Dark Stone Village Theme */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito","Segoe UI",Arial,sans-serif;background:#1a1a1a;overflow:hidden;height:100vh;user-select:none}
canvas{display:block;cursor:pointer;touch-action:none;image-rendering:auto;-webkit-tap-highlight-color:transparent}
.hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;padding:4px 14px;background:linear-gradient(180deg,rgba(35,30,25,0.95),rgba(22,18,15,0.95));border-bottom:3px solid #5a5550;z-index:10;height:38px;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,0.6);font-family:'Courier New',monospace}
.hud-clock{font-size:18px;font-weight:bold;color:#c8b888}
.hud-info{font-size:12px;color:#9a9088}.hud-info b{color:#d0ccc8}
.hud-money{margin-left:auto;font-size:16px;font-weight:bold;color:#c8b888}
.hud-whole{font-size:11px;color:#8a7a90}
.toolbar{position:fixed;bottom:0;left:0;right:0;display:flex;padding:5px 8px;background:linear-gradient(180deg,rgba(35,30,25,0.95),rgba(22,18,15,0.95));border-top:3px solid #5a5550;z-index:10;height:48px;gap:6px;box-shadow:0 -2px 8px rgba(0,0,0,0.6)}
.tb{flex:1;padding:6px;border:2px solid rgba(90,85,80,0.4);border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px;color:#d0ccc8;transition:transform .1s;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
.tb:hover{transform:scale(1.05);border-color:#c8b888}.tb:active{transform:scale(0.95)}
.tb.t{background:linear-gradient(180deg,#4a3a2a,#3a2a1a)}
.tb.s{background:linear-gradient(180deg,#3a4a28,#2a3a1a)}
.tb.a{background:linear-gradient(180deg,#4a4020,#3a3018)}
.tb.d{background:linear-gradient(180deg,#3a3040,#2a2030)}
.tb.tr{background:linear-gradient(180deg,#3a3020,#2a2218)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.active{display:flex}
.modal{background:linear-gradient(135deg,#2a2520,#221e18);border:3px solid #5a5550;border-radius:10px;padding:14px;max-width:420px;width:92%;max-height:75vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.7)}
.modal h2{color:#c8b888;text-align:center;margin-bottom:8px;font-size:16px;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
.modal-info{background:rgba(0,0,0,0.3);padding:10px;border-radius:6px;margin-bottom:8px;font-size:13px;line-height:1.5;color:#d0ccc8}
.mbtns{display:flex;gap:6px;margin-top:8px}
.mbtns button{flex:1;padding:10px;border:2px solid rgba(90,85,80,0.3);border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px;transition:transform .1s;color:#d0ccc8}
.mbtns button:hover{transform:scale(1.04);border-color:#c8b888}
.bs{background:#3a5a28}.bd{background:#4a3a2a}.bw{background:#2a4a5a}.bp{background:#5a5028}.br{background:#5a2a2a}.bc{background:#3a3020}
.item{display:flex;align-items:center;background:rgba(0,0,0,0.3);padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:4px;border:1px solid rgba(90,85,80,0.15)}
.item:hover{background:rgba(255,255,255,0.04);border-color:rgba(90,85,80,0.3)}
.item .inf{flex:1}.item .inf .nm{font-weight:bold;font-size:13px;color:#d0ccc8}.item .inf .dt{font-size:11px;color:#888}
.item .pr{color:#c8b888;font-weight:bold;font-size:13px}
.si{background:rgba(0,0,0,0.3);padding:10px;border-radius:6px;margin-bottom:5px}
.si .sh{display:flex;justify-content:space-between;font-weight:bold;font-size:13px;color:#d0ccc8}
.si .sd{font-size:11px;color:#888}
.si button{margin-top:4px;background:#3a5a28;color:#d0ccc8;border:1px solid #5a7a40;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:bold}
.sbar{width:100%;height:14px;background:rgba(0,0,0,0.3);border-radius:7px;overflow:hidden;margin:4px 0}
.sfill{height:100%;background:linear-gradient(90deg,#3a5a28,#c8b888);transition:width .3s}
.sitem{display:flex;justify-content:space-between;padding:5px 8px;background:rgba(0,0,0,0.2);border-radius:4px;margin-bottom:3px;font-size:11px;color:#d0ccc8}
.toast{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);background:rgba(35,30,25,0.95);border:2px solid #5a5550;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:bold;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;color:#c8b888;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
.toast.show{opacity:1}
.info-panel{position:fixed;top:44px;left:6px;background:rgba(30,28,22,0.9);border-radius:8px;padding:8px 10px;z-index:10;width:180px;border:2px solid #4a6a38;transition:opacity .8s;font-size:11px;color:#7a9a60;line-height:1.3;text-shadow:1px 1px 1px rgba(0,0,0,0.5)}
.mission-box{position:fixed;bottom:56px;right:6px;background:rgba(35,30,25,0.95);border:2px solid #5a5550;border-radius:8px;padding:0;z-index:10;width:220px;transition:all .3s;display:none}
.mission-box.show{display:block}
.mission-header{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;cursor:pointer;user-select:none}
.mission-header h4{color:#c8b888;font-size:12px;margin:0}
.mission-toggle{color:#c8b888;font-size:14px;font-weight:bold}
.mission-body{padding:0 8px 8px 8px;max-height:300px;overflow-y:auto;display:block}
.mission-box.collapsed .mission-body{display:none}
.mi{display:flex;align-items:center;gap:5px;margin-bottom:5px;color:#bbb;font-size:11px;line-height:1.2}
.mi.done{color:#7a9a60;text-decoration:line-through}
.mi .check{width:12px;height:12px;border:2px solid #666;border-radius:2px;display:inline-block;flex-shrink:0}
.mi.done .check{background:#7a9a60;border-color:#7a9a60}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:rgba(0,0,0,0.2)}::-webkit-scrollbar-thumb{background:#5a5550;border-radius:2px}
.hud-btn{margin-left:8px;padding:4px 10px;background:linear-gradient(180deg,#4a3a2a,#3a2a1a);border:2px solid #5a5550;border-radius:5px;color:#c8b888;font-weight:bold;font-size:12px;cursor:pointer;text-shadow:1px 1px 2px rgba(0,0,0,0.5);transition:transform .1s}
.hud-btn:hover{transform:scale(1.08);border-color:#c8b888}
.hud-btn:active{transform:scale(0.95)}
.tb-icon{font-size:24px;display:block;line-height:1}
.tb-label{font-size:9px;display:block;margin-top:1px;line-height:1}
.tesis-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:8px}
.tesis-item{display:flex;flex-direction:column;align-items:center;width:80px;padding:10px 6px;background:rgba(0,0,0,0.3);border-radius:8px;border:2px solid rgba(90,85,80,0.2);cursor:pointer;transition:transform .1s}
.tesis-item:hover{transform:scale(1.08);border-color:#c8b888}
.tesis-item canvas{border-radius:4px}
.tesis-item span{font-size:10px;color:#c8b888;margin-top:4px;text-align:center;font-weight:bold}
.catalog-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:6px}
.catalog-item{position:relative;width:72px;height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);border-radius:8px;border:2px solid rgba(90,85,80,0.2);cursor:pointer;transition:all .15s;overflow:hidden}
.catalog-item:hover{transform:scale(1.1);border-color:#c8b888;background:rgba(0,0,0,0.6)}
.catalog-item:hover .catalog-detail{display:flex}
.catalog-item canvas{border-radius:4px}
.catalog-item .catalog-name{font-size:8px;color:#c8b888;margin-top:2px;font-weight:bold;text-align:center;line-height:1}
.catalog-item .catalog-price{font-size:8px;color:#7a9a60;font-weight:bold}
.catalog-detail{display:none;position:absolute;bottom:0;left:0;right:0;background:rgba(22,18,15,0.95);padding:4px;border-radius:0 0 6px 6px;flex-direction:column;align-items:center;font-size:8px;color:#bbb;line-height:1.3;border-top:1px solid #5a5550;pointer-events:none}
.catalog-detail b{color:#c8b888}
.animal-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:6px}
.animal-card{display:flex;flex-direction:column;align-items:center;width:90px;padding:8px 4px;background:rgba(0,0,0,0.3);border-radius:8px;border:2px solid rgba(90,85,80,0.2);cursor:pointer;transition:all .15s}
.animal-card:hover{transform:scale(1.05);border-color:#c8b888}
.animal-card canvas{border-radius:4px}
.animal-card .ac-name{font-size:10px;color:#c8b888;margin-top:3px;font-weight:bold}
.animal-card .ac-info{font-size:8px;color:#888;text-align:center}
.animal-card .ac-price{font-size:9px;color:#7a9a60;font-weight:bold;margin-top:3px}
.tutorial-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none}
.tutorial-box{background:rgba(22,18,15,0.85);border:2px solid #5a7a40;border-radius:12px;padding:20px 24px;max-width:420px;width:90vw;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.7);backdrop-filter:blur(4px);pointer-events:auto}
.tutorial-box.minimized{max-width:180px;padding:8px 12px;cursor:pointer}
.tutorial-box.minimized .tutorial-title{font-size:12px;margin-bottom:4px}
.tutorial-box.minimized .tutorial-chain,.tutorial-box.minimized .tutorial-btn,.tutorial-box.minimized .tutorial-close{display:none}
.tutorial-title{color:#7a9a60;font-size:18px;font-weight:bold;margin-bottom:16px}
.tutorial-chain{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tutorial-chain .tc-item{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid #4a4038;background:rgba(0,0,0,0.3);transition:all .3s}
.tutorial-chain .tc-item.active{border-color:#d4880a;background:rgba(212,136,10,0.2);box-shadow:0 0 8px rgba(212,136,10,0.4)}
.tutorial-chain .tc-item.done{border-color:#5a8a40;background:rgba(90,138,64,0.2)}
.tutorial-chain .tc-arrow{color:#555;font-size:16px}
.tutorial-btn{background:linear-gradient(180deg,#3a5a28,#2a4a1a);color:#d0ccc8;border:2px solid #5a7a40;padding:10px 32px;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:8px}
.tutorial-btn:hover{transform:scale(1.03)}
.tutorial-close{position:absolute;top:8px;right:12px;background:none;border:none;color:#777;font-size:18px;cursor:pointer}
.tutorial-minimize{position:absolute;top:4px;left:8px;background:none;border:none;color:#d4880a;font-size:16px;cursor:pointer;z-index:5}
.tutorial-step-popup{position:fixed;right:16px;top:50%;transform:translateY(-50%);background:rgba(22,18,15,0.8);border:2px solid #d4880a;border-radius:10px;padding:14px 18px;max-width:220px;z-index:210;box-shadow:0 4px 16px rgba(0,0,0,0.6);backdrop-filter:blur(4px);pointer-events:none}
.tutorial-step-num{color:#d4880a;font-size:12px;font-weight:bold;margin-bottom:6px}
.tutorial-step-text{color:#c8b888;font-size:13px;line-height:1.4}
.tutorial-step-text .step-action{display:inline-block;margin-top:8px;padding:6px 14px;background:#2a4a1a;color:#d0ccc8;border-radius:6px;font-size:11px;font-weight:bold}
.login-bg{position:fixed;inset:0;background:linear-gradient(135deg,#0a0a0a,#151210);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column}
.login-box{background:linear-gradient(135deg,#2a2520,#221e18);border:3px solid #5a5550;border-radius:12px;padding:24px;width:320px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.7)}
.login-box h2{color:#c8b888;text-align:center;margin-bottom:16px;font-size:20px;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
.login-box .field{margin-bottom:12px}
.login-box label{display:block;color:#9a9088;font-size:12px;margin-bottom:4px}
.login-box input{width:100%;padding:10px;border:2px solid #5a5048;border-radius:6px;background:rgba(0,0,0,0.3);color:#d0ccc8;font-size:14px;outline:none;transition:border-color .2s}
.login-box input:focus{border-color:#c8b888}
.login-box .login-btn{width:100%;padding:12px;border:none;border-radius:6px;font-weight:bold;font-size:14px;cursor:pointer;transition:transform .1s;margin-top:4px}
.login-box .login-btn:active{transform:scale(0.97)}
.login-box .login-btn.primary{background:linear-gradient(180deg,#3a5a28,#2a4a1a);color:#d0ccc8;border:2px solid #5a7a40}
.login-box .login-btn.secondary{background:linear-gradient(180deg,#4a3a2a,#3a2a1a);color:#c8b888;border:2px solid #5a5550;margin-top:8px}
.login-box .login-btn:hover{transform:scale(1.02)}
.login-logo{font-size:48px;margin-bottom:12px;text-align:center}
.login-error{color:#c47070;font-size:11px;margin-top:6px;display:none;text-align:center}
.login-tabs{display:flex;gap:0;margin-bottom:16px}
.login-tab{flex:1;padding:8px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:#6a6058;font-weight:bold;font-size:13px;transition:all .2s}
.login-tab.active{color:#c8b888;border-bottom-color:#c8b888}
</style>
<script>
window.showLoginTab=function(t){
  document.querySelectorAll('.login-tab').forEach(function(el){el.classList.remove('active')});
  document.getElementById('loginForm').style.display=t==='login'?'block':'none';
  document.getElementById('registerForm').style.display=t==='register'?'block':'none';
  document.querySelectorAll('.login-tab')[t==='login'?0:1].classList.add('active');
  document.getElementById('loginErr').style.display='none';
  document.getElementById('regErr').style.display='none';
};
window.showErr=function(id,msg){
  var e=document.getElementById(id);e.textContent=msg;e.style.display='block';
};
window.doLogin=function(){
  var u=document.getElementById('loginUser').value.trim();
  var p=document.getElementById('loginPass').value;
  if(!u||!p){showErr('loginErr','Kullanıcı adı ve şifre gerekli');return}
  var users;
  try{users=JSON.parse(localStorage.getItem('farm_users')||'{}')}catch(e){users={}}
  if(!users[u]){showErr('loginErr','Böyle bir kullanıcı yok');return}
  if(users[u]!==p){showErr('loginErr','Şifre hatalı');return}
  sessionStorage.setItem('farm_user',u);
  if(typeof startGame==='function'){startGame()}
  else{location.reload()}
};
window.doRegister=function(){
  var u=document.getElementById('regUser').value.trim();
  var p=document.getElementById('regPass').value;
  var p2=document.getElementById('regPass2').value;
  if(!u||u.length<3){showErr('regErr','Kullanıcı adı en az 3 karakter');return}
  if(!p||p.length<4){showErr('regErr','Şifre en az 4 karakter');return}
  if(p!==p2){showErr('regErr','Şifreler eşleşmiyor');return}
  var users;
  try{users=JSON.parse(localStorage.getItem('farm_users')||'{}')}catch(e){users={}}
  if(users[u]){showErr('regErr','Bu kullanıcı adı zaten var');return}
  users[u]=p;localStorage.setItem('farm_users',JSON.stringify(users));
  sessionStorage.setItem('farm_user',u);
  if(typeof startGame==='function'){startGame()}
  else{location.reload()}
};
window.doGuestLogin=function(){
  sessionStorage.setItem('farm_user','Misafir');
  if(typeof startGame==='function'&&typeof GameManager!=='undefined'){
    GameManager.resetState();
    startGame();
  }else{location.reload()}
};
window.doLogout=function(){
  sessionStorage.removeItem('farm_user');
  location.reload();
};
</script>
<script type="module" src="app/js/core.js?v=1.046"></script>
</head>
<body>
<div class="login-bg" id="loginBg">
  <div class="login-box">
    <div class="login-logo">🌾🐄</div>
    <div class="login-version" style="color:#8bc34a;font-size:12px;margin-bottom:8px;opacity:0.7">v1.046</div>
    <div class="login-tabs">
      <div class="login-tab active" onclick="showLoginTab('login')">Giriş Yap</div>
      <div class="login-tab" onclick="showLoginTab('register')">Kayıt Ol</div>
    </div>
    <div id="loginForm">
      <div class="field"><label>Kullanıcı Adı</label><input type="text" id="loginUser" placeholder="Kullanıcı adı"></div>
      <div class="field"><label>Şifre</label><input type="password" id="loginPass" placeholder="Şifre"></div>
      <div class="login-error" id="loginErr"></div>
      <button class="login-btn primary" onclick="doLogin()">Giriş Yap</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="field"><label>Kullanıcı Adı</label><input type="text" id="regUser" placeholder="Kullanıcı adı (min 3 karakter)"></div>
      <div class="field"><label>Şifre</label><input type="password" id="regPass" placeholder="Şifre (min 4 karakter)"></div>
      <div class="field"><label>Şifre Tekrar</label><input type="password" id="regPass2" placeholder="Şifre tekrar"></div>
      <div class="login-error" id="regErr"></div>
      <button class="login-btn primary" onclick="doRegister()">Kayıt Ol</button>
    </div>
    <button class="login-btn secondary" onclick="doGuestLogin()" style="width:100%;margin-top:12px">🎭 Misafir Girişi</button>
  </div>
</div>
<canvas id="c"></canvas>
<div class="hud">
    <div class="hud-clock" id="clock">06:00</div>
    <div class="hud-info">Gün <b id="hDay">1</b></div>
    <div class="hud-info" id="hSeason">İlkbahar</div>
    <div class="hud-info">Yıl <b id="hYear">1</b></div>
    <div class="hud-whole" id="hWhole">Toptancı: 12:30</div>
    <div class="hud-info" id="hWeather" style="font-size:13px">Güneşli</div>
    <div class="hud-info" id="hWind" style="font-size:12px">Rüzgar: 5 km/h</div>
    <div class="hud-info" id="hVersion" style="font-size:10px;color:#ffe082;opacity:0.7">v1.046</div>
    <button class="hud-btn" onclick="advanceTime()">+10 DK</button>
    <button class="hud-btn" onclick="zoomTarget=Math.max(0.5,zoomTarget-0.2);zoomCX=W/2;zoomCY=H/2;panX=0;panY=0;draw()" title="Uzaklaştır">➖</button>
    <button class="hud-btn" onclick="zoomTarget=1;zoomCX=W/2;zoomCY=H/2;panX=0;panY=0;draw()" title="Sıfırla">🔄</button>
    <button class="hud-btn" onclick="zoomTarget=Math.min(3,zoomTarget+0.2);zoomCX=W/2;zoomCY=H/2;panX=0;panY=0;draw()" title="Yakınlaştır">➕</button>
    <button class="hud-btn" onclick="doLogout()" title="Çıkış">🚪</button>
    <div class="hud-money" id="hMoney">5.000 TL</div>
</div>
<div class="mission-box" id="missionBox">
    <div class="mission-header">
        <h4>Günlük Görev</h4>
    </div>
    <div class="mission-body" id="missionBody"><div id="missionList"></div></div>
</div>
<div class="toolbar">
    <button class="tb s" onclick="openM('shop')"><span class="tb-icon">&#127793;</span></button>
    <button class="tb d" onclick="openM('storage')"><span class="tb-icon">&#128230;</span></button>
    <button class="tb tr" onclick="activateTraktör()"><span class="tb-icon">&#128668;</span></button>
    <button class="tb tf" onclick="openTesisler()"><span class="tb-icon">&#127981;</span></button>
    <button class="tb" onclick="toggleMissions()" style="background:#6d4c41"><span class="tb-icon">&#128203;</span></button>
    <button class="tb tut" onclick="openTutorial()" style="background:#2e7d32"><span class="tb-icon">&#128218;</span></button>
</div>
<div class="info-panel" id="infoPanel">Sebze ekimi yaparak başla!</div>
<div class="modal-bg" id="mShop"><div class="modal"><h2>Mağaza</h2><div id="shopList"></div><div class="mbtns"><button class="bc" onclick="closeM('shop')">Kapat</button></div></div></div>
<div class="modal-bg" id="mAnimal"><div class="modal"><h2>Hayvanlar</h2><div id="animalList"></div><div class="mbtns"><button class="bc" onclick="closeM('animal')">Kapat</button></div></div></div>
